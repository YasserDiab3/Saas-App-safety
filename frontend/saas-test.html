<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SaaS Connectivity Test — HSE</title>
<link rel="stylesheet" href="css/saas-pages.css">
<style>
  body{padding:24px}
  .tester{max-width:780px;margin:0 auto}
  .tester h1{color:#fff;font-size:1.25rem}
  .tester .muted-s{color:#cbd5e1}
  .tcard{background:#fff;color:#1e293b;border-radius:12px;padding:16px 18px;margin:12px 0;box-shadow:0 10px 30px rgba(8,20,45,.18)}
  .tcard label{display:block;font-size:.78rem;color:#475569;margin:8px 0 3px;font-weight:700}
  .tcard input{width:100%;padding:9px 11px;border-radius:9px;border:1.5px solid #e2e8f0;font-family:inherit}
  pre{background:#0b1220;color:#e2e8f0;border:1px solid #1e293b;border-radius:10px;padding:12px;overflow:auto;max-height:340px;font-size:.78rem;white-space:pre-wrap}
  .ok{color:#4ade80}.err{color:#f87171}
</style>
</head>
<body data-i18n-title="tt_title">
  <div class="tester">
    <h1>🔌 <span id="t-title"></span></h1>
    <p class="muted-s" id="t-sub"></p>

    <div class="tcard">
      <label id="t-l-email"></label><input id="email" value="owner@test.com">
      <label id="t-l-pwd"></label><input id="pwd" type="password" value="Test12345!">
      <label id="t-l-tenant"></label><input id="tenant" value="Test Org 2">
      <div class="row">
        <button class="saas-btn sm" onclick="doSignup()" id="b1"></button>
        <button class="saas-btn sm" onclick="doLogin()" id="b2"></button>
        <button class="saas-btn sm" onclick="doProvision()" id="b3"></button>
        <button class="saas-btn sm ghost" onclick="doWhoami()" id="b4"></button>
      </div>
    </div>

    <div class="tcard">
      <label id="t-l-sheet"></label><input id="sheet" value="UserTasks">
      <div class="row">
        <button class="saas-btn sm" onclick="doRead()" id="b5"></button>
        <button class="saas-btn sm" onclick="doInsert()" id="b6"></button>
        <button class="saas-btn sm" onclick="doReadAgain()" id="b7"></button>
        <button class="saas-btn sm ghost" onclick="doSignout()" id="b8"></button>
      </div>
    </div>

    <pre id="out">…</pre>
  </div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script src="js/saas/saas-adapter.js"></script>
  <script src="js/saas/saas-i18n.js"></script>
  <script>
    // page-local bilingual strings (dev tool — kept out of the shared dict)
    const L = {
      ar: { tt_title:'اختبار اتصال SaaS (Supabase)', sub:'صفحة معزولة لاختبار الاتصال. لا تمسّ التطبيق الرئيسي.',
            email:'البريد', pwd:'كلمة المرور', tenant:'اسم المؤسسة (للتسجيل الأول)', sheet:'اسم الورقة',
            b1:'1) تسجيل حساب', b2:'2) دخول', b3:'3) إنشاء مؤسسة', b4:'من أنا + الدور',
            b5:'قراءة الورقة', b6:'إدراج صف تجريبي', b7:'قراءة بعد الإدراج', b8:'خروج', ready:'جاهز…' },
      en: { tt_title:'SaaS Connectivity Test (Supabase)', sub:'Isolated connectivity test page. Does not touch the main app.',
            email:'Email', pwd:'Password', tenant:'Organization name (first signup)', sheet:'Sheet name',
            b1:'1) Sign up', b2:'2) Sign in', b3:'3) Create org', b4:'Who am I + role',
            b5:'Read sheet', b6:'Insert test row', b7:'Read after insert', b8:'Sign out', ready:'Ready…' }
    };
    const out = document.getElementById('out');
    const v = id => document.getElementById(id).value;
    function applyLocal(){
      const d = L[SaaSI18n.lang] || L.ar;
      document.getElementById('t-title').textContent = d.tt_title;
      document.getElementById('t-sub').textContent = d.sub;
      document.getElementById('t-l-email').textContent = d.email;
      document.getElementById('t-l-pwd').textContent = d.pwd;
      document.getElementById('t-l-tenant').textContent = d.tenant;
      document.getElementById('t-l-sheet').textContent = d.sheet;
      ['b1','b2','b3','b4','b5','b6','b7','b8'].forEach(id=>document.getElementById(id).textContent=d[id]);
      if(out.textContent==='…'||out.textContent==='جاهز…'||out.textContent==='Ready…') out.textContent=d.ready;
    }
    document.addEventListener('DOMContentLoaded', () => SaaSI18n.init(applyLocal));
    function log(label, obj, cls){
      const t = new Date().toLocaleTimeString();
      out.innerHTML = `<span class="${cls||''}">[${t}] ${label}</span>\n` +
        (typeof obj==='string'?obj:JSON.stringify(obj,null,2)) + '\n\n' + out.innerHTML;
    }
    async function doSignup(){ const r=await SaaS.signUp(v('email'),v('pwd'),'Owner Test'); log('signUp', r.error?r.error.message:r.data, r.error?'err':'ok'); }
    async function doLogin(){ const r=await SaaSAdapter.sendRequest({action:'login',data:{email:v('email'),password:v('pwd')}}); log('login', r, r.success?'ok':'err'); }
    async function doProvision(){ await SaaS.ready; const {data,error}=await SaaS.client().rpc('api_provision_tenant',{p_name:v('tenant')}); log('provision_tenant', error?error.message:data, error?'err':'ok'); }
    async function doWhoami(){ await SaaS.ready; const {data}=await SaaS.client().rpc('api_me'); log('api_me', data||{}, 'ok'); }
    async function doRead(){ const r=await SaaSAdapter.sendRequest({action:'readFromSheet',data:{sheetName:v('sheet')}}); log('readFromSheet '+v('sheet'), r, r.success?'ok':'err'); }
    async function doInsert(){ const row={id:'TEST-'+Date.now(),title:'مهمة اختبار',status:'قيد التنفيذ',priority:'متوسط'}; const r=await SaaSAdapter.sendRequest({action:'appendToSheet',data:{sheetName:v('sheet'),data:row}}); log('appendToSheet', r, r.success?'ok':'err'); }
    async function doReadAgain(){ return doRead(); }
    async function doSignout(){ await SaaS.signOut(); log('signOut','done','ok'); }
  </script>
</body>
</html>
