<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>تسجيل الدخول — HSEHub 360</title>
<meta name="description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta property="og:site_name" content="HSEHub 360">
<meta property="og:title" content="HSEHub 360 — Safety • Health • Environment">
<meta property="og:description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta property="og:image" content="https://saas-app-safety.vercel.app/assets/brand/logo.png">
<meta name="application-name" content="HSEHub 360">
<link rel="icon" type="image/png" href="/assets/brand/favicon.png">
<link rel="stylesheet" href="/css/saas-pages.css">
<link rel="preconnect" href="https://tbkajjarkqhsdiabufjv.supabase.co" crossorigin>
</head>
<body data-i18n-title="login_doctitle">
  <div class="saas-shell">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="/assets/brand/logo.png" alt="HSEHub 360" class="saas-logo-img"></div>
        <h1 data-i18n="login_title">تسجيل الدخول</h1>
        <p data-i18n="brand_sub">HSEHub 360 — السلامة • الصحة • البيئة</p>
      </div>
      <div class="saas-body">
        <div class="saas-field">
          <label data-i18n="f_email">البريد الإلكتروني</label>
          <div class="saas-input-wrap">
            <span class="saas-input-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            <input id="email" class="saas-input saas-input--icon" type="email" inputmode="email" autocapitalize="none" autocomplete="username" data-i18n-ph="ph_email">
          </div>
        </div>
        <div class="saas-field">
          <label data-i18n="f_password">كلمة المرور</label>
          <div class="saas-input-wrap">
            <span class="saas-input-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input id="pwd" class="saas-input saas-input--icon saas-input--pwd" type="password" autocomplete="current-password" data-i18n-ph="ph_pwd">
            <button type="button" class="saas-pwd-toggle" aria-controls="pwd"></button>
          </div>
        </div>
        <div id="mfa-step" class="saas-mfa-step" hidden>
          <div class="saas-field">
            <label data-i18n="mfa_code_label">رمز المصادقة الثنائية</label>
            <input id="mfa-code" class="saas-input" inputmode="numeric" autocomplete="one-time-code" maxlength="6" dir="ltr" data-i18n-ph="mfa_code_ph">
          </div>
          <button id="mfa-go" class="saas-btn" data-i18n="mfa_verify_btn">تحقق</button>
        </div>
        <button id="go" class="saas-btn" data-i18n="btn_login">دخول</button>
        <div class="saas-msg" id="msg"></div>
        <div class="saas-foot">
          <span data-i18n="no_account">لا تملك حساباً؟</span>
          <a href="/signup" data-i18n="signup_link">أنشئ مؤسسة جديدة</a>
        </div>
        <div class="saas-version-foot">
          <span id="login-footer-version" class="saas-version-badge" dir="ltr" title="إصدار التطبيق">…</span>
          <button type="button" id="login-footer-update" class="saas-version-update-btn" hidden>تحديث متاح</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/saas/saas-config.js"></script>
  <script src="/js/saas/saas-auth-storage.js"></script>
  <script src="/js/saas/supabase-bootstrap.js"></script>
  <script src="/js/saas/saas-device-track.js"></script>
  <script src="/js/saas/saas-i18n.js"></script>
  <script src="/js/saas/saas-auth-fields.js"></script>
  <script src="/js/saas/saas-brand.js"></script>
  <script src="/js/saas/saas-mfa.js"></script>
  <script src="/js/saas/saas-version.js" defer></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => (window.SaaSI18n ? SaaSI18n.t(k) : k);
    const msg = (t, cls) => { $('msg').className = 'saas-msg ' + (cls || ''); $('msg').textContent = t; };

    function safeNext(raw) {
      const n = (raw || '/').trim();
      if (!n.startsWith('/') || n.startsWith('//')) return '/';
      return n;
    }

    function nextUrl() {
      const q = new URLSearchParams(location.search);
      return safeNext(q.get('next') || q.get('redirect'));
    }

    document.getElementById('go').addEventListener('click', doLogin);
    document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('mfa-go').addEventListener('click', doMfaVerify);
    document.getElementById('mfa-code').addEventListener('keydown', e => { if (e.key === 'Enter') doMfaVerify(); });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.SaaSI18n) SaaSI18n.init(() => {
        if (window.SaaSBrand && SaaSBrand.applySocialMeta) {
          SaaSBrand.applySocialMeta({ title: document.title });
        }
        if (window.SaaSAuthFields) {
          SaaSAuthFields.init();
          SaaSAuthFields.refreshLabels();
        }
      });
      else if (window.SaaSBrand && SaaSBrand.applySocialMeta) SaaSBrand.applySocialMeta();
      if (window.SaaSAuthFields) SaaSAuthFields.init();
    });

    (async () => {
      if (window.SaaSAuthStorage) await SaaSAuthStorage.clearServiceWorkers();
      await SaaS.ready;
      if (!SaaS.client()) {
        msg('تعذّر تحميل نظام الدخول. تحقق من الاتصال أو حدّث الصفحة.', 'err');
        return;
      }
      const s = await SaaS.getSession();
      if (s) {
        const exp = s.expires_at || 0;
        if (exp && exp < Math.floor(Date.now() / 1000) - 30) {
          await SaaS.signOut();
          if (window.SaaSAuthStorage) SaaSAuthStorage.clearSession(window.SAAS_CONFIG);
          return;
        }
        if (window.SaaSAuthStorage) SaaSAuthStorage.markSessionActive();
        location.replace(nextUrl());
      }
    })();

    function authErrorMessage(raw) {
      const m = String(raw || '');
      if (/failed to fetch|networkerror|network error|load failed|521|503|enotfound/i.test(m)) {
        return 'تعذّر الاتصال بخادم HSEHub 360. تحقق من الإنترنت — أو أن مشروع Supabase غير موقوف (Inactive).';
      }
      return m;
    }

    async function finishLogin() {
      const session = await SaaS.waitForPersistedSession(4000);
      if (!session) {
        msg('تعذّر حفظ الجلسة على هذا الجهاز. حدّث الصفحة وحاول مرة أخرى.', 'err');
        $('go').disabled = false;
        return;
      }
      if (window.SaaSAuthStorage) {
        SaaSAuthStorage.markSessionActive();
        await SaaSAuthStorage.clearServiceWorkers();
      }
      if (window.SaaSDeviceTrack) SaaSDeviceTrack.report({ force: true });
      msg(T('login_ok') || 'تم الدخول', 'ok');
      setTimeout(() => location.replace(nextUrl()), 200);
    }

    function showMfaStep() {
      $('mfa-step').hidden = false;
      $('go').hidden = true;
      document.querySelector('.saas-field:nth-of-type(1)').style.display = 'none';
      document.querySelector('.saas-field:nth-of-type(2)').style.display = 'none';
      msg(T('mfa_prompt') || 'أدخل رمز المصادقة الثنائية من تطبيقك', '');
      $('mfa-code').focus();
    }

    async function doMfaVerify() {
      const code = $('mfa-code').value.trim();
      if (!code) { msg(T('mfa_code_required') || 'أدخل رمز التحقق', 'err'); return; }
      $('mfa-go').disabled = true;
      try {
        await SaaSMfa.verifyTotpCode(SaaS.client(), code);
        await finishLogin();
      } catch (e) {
        msg(window.SaaSMfa ? SaaSMfa.mapMfaError(e) : (e.message || T('mfa_invalid') || 'رمز غير صحيح'), 'err');
        $('mfa-go').disabled = false;
      }
    }

    async function doLogin() {
      const email = $('email').value.trim(), pwd = $('pwd').value;
      if (!email || !pwd) { msg(T('err_fill_both') || 'أدخل البريد وكلمة المرور', 'err'); return; }
      if (!SaaS.client()) {
        msg('تعذّر الاتصال بخادم الدخول. تحقق من الإنترنت.', 'err');
        return;
      }
      $('go').disabled = true;
      msg(T('login_filling') || 'جاري التحقق…');
      try {
        const r = await SaaS.signIn(email, pwd);
        if (r.error) {
          const m = authErrorMessage(r.error.message) || T('err_login_failed') || 'فشل الدخول';
          msg(/storage|localstorage|quota/i.test(m)
            ? 'المتصفح يمنع حفظ الجلسة. جرّب Safari/Chrome خارج وضع التصفح الخاص.'
            : m, 'err');
          $('go').disabled = false;
          return;
        }
        if (window.SaaSMfa && await SaaSMfa.needsVerification(SaaS.client())) {
          showMfaStep();
          return;
        }
        await finishLogin();
      } catch (e) {
        msg(authErrorMessage(e.message) || 'فشل الدخول', 'err');
        $('go').disabled = false;
      }
    }
  </script>
</body>
</html>
