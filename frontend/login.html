<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>تسجيل الدخول — QHSSE Consultant</title>
<link rel="icon" type="image/png" href="assets/brand/favicon.png">
<link rel="stylesheet" href="css/saas-pages.css">
<link rel="preconnect" href="https://tbkajjarkqhsdiabufjv.supabase.co" crossorigin>
</head>
<body data-i18n-title="login_doctitle">
  <div class="saas-shell">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="assets/brand/logo.png" alt="QHSSE Consultant" class="saas-logo-img"></div>
        <h1 data-i18n="login_title">تسجيل الدخول</h1>
        <p data-i18n="brand_sub">منصّة إدارة السلامة المهنية (HSE)</p>
      </div>
      <div class="saas-body">
        <div class="saas-field">
          <label data-i18n="f_email">البريد الإلكتروني</label>
          <input id="email" class="saas-input" type="email" inputmode="email" autocapitalize="none" autocomplete="username">
        </div>
        <div class="saas-field">
          <label data-i18n="f_password">كلمة المرور</label>
          <input id="pwd" class="saas-input" type="password" autocomplete="current-password">
        </div>
        <button id="go" class="saas-btn" data-i18n="btn_login">دخول</button>
        <div class="saas-msg" id="msg"></div>
        <div class="saas-foot">
          <span data-i18n="no_account">لا تملك حساباً؟</span>
          <a href="/signup" data-i18n="signup_link">أنشئ مؤسسة جديدة</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/saas/saas-config.js"></script>
  <script src="/js/saas/saas-auth-storage.js"></script>
  <script src="/js/saas/supabase-bootstrap.js"></script>
  <script src="/js/saas/saas-i18n.js"></script>
  <script src="/js/saas/saas-brand.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => (window.SaaSI18n ? SaaSI18n.t(k) : k);
    const msg = (t, cls) => { $('msg').className = 'saas-msg ' + (cls || ''); $('msg').textContent = t; };

    function safeNext(raw) {
      const n = (raw || '/').trim();
      if (!n.startsWith('/') || n.startsWith('//')) return '/';
      return n;
    }

    function nextUrl() {
      const q = new URLSearchParams(location.search);
      return safeNext(q.get('next') || q.get('redirect'));
    }

    document.getElementById('go').addEventListener('click', doLogin);
    document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.SaaSI18n) SaaSI18n.init();
    });

    (async () => {
      if (window.SaaSAuthStorage) await SaaSAuthStorage.clearServiceWorkers();
      await SaaS.ready;
      if (!SaaS.client()) {
        msg('تعذّر تحميل نظام الدخول. تحقق من الاتصال أو حدّث الصفحة.', 'err');
        return;
      }
      const s = await SaaS.getSession();
      if (s) location.replace(nextUrl());
    })();

    async function doLogin() {
      const email = $('email').value.trim(), pwd = $('pwd').value;
      if (!email || !pwd) { msg(T('err_fill_both') || 'أدخل البريد وكلمة المرور', 'err'); return; }
      if (!SaaS.client()) {
        msg('تعذّر الاتصال بخادم الدخول. تحقق من الإنترنت.', 'err');
        return;
      }
      $('go').disabled = true;
      msg(T('login_filling') || 'جاري التحقق…');
      const r = await SaaS.signIn(email, pwd);
      if (r.error) {
        const m = r.error.message || T('err_login_failed') || 'فشل الدخول';
        msg(/storage|localstorage|quota/i.test(m)
          ? 'المتصفح يمنع حفظ الجلسة. جرّب Safari/Chrome خارج وضع التصفح الخاص.'
          : m, 'err');
        $('go').disabled = false;
        return;
      }
      const session = await SaaS.waitForPersistedSession(4000);
      if (!session) {
        msg('تعذّر حفظ الجلسة على هذا الجهاز. حدّث الصفحة وحاول مرة أخرى.', 'err');
        $('go').disabled = false;
        return;
      }
      if (window.SaaSAuthStorage) await SaaSAuthStorage.clearServiceWorkers();
      msg(T('login_ok') || 'تم الدخول', 'ok');
      setTimeout(() => location.replace(nextUrl()), 200);
    }
  </script>
</body>
</html>
