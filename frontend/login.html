<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل الدخول — QHSSE Consultant</title>
<link rel="icon" type="image/png" href="assets/brand/favicon.png">
<link rel="stylesheet" href="css/saas-pages.css">
</head>
<body data-i18n-title="login_doctitle">
  <div class="saas-shell">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="assets/brand/logo.png" alt="QHSSE Consultant" class="saas-logo-img"></div>
        <h1 data-i18n="login_title">تسجيل الدخول</h1>
        <p data-i18n="brand_sub">منصّة إدارة السلامة المهنية (HSE)</p>
      </div>
      <div class="saas-body">
        <div class="saas-field">
          <label data-i18n="f_email">البريد الإلكتروني</label>
          <input id="email" class="saas-input" type="email" data-i18n-ph="ph_email" autocomplete="username">
        </div>
        <div class="saas-field">
          <label data-i18n="f_password">كلمة المرور</label>
          <input id="pwd" class="saas-input" type="password" data-i18n-ph="ph_pwd" autocomplete="current-password">
        </div>
        <button id="go" class="saas-btn" data-i18n="btn_login" onclick="doLogin()">دخول</button>
        <div class="saas-msg" id="msg"></div>
        <div class="saas-foot">
          <span data-i18n="no_account">لا تملك حساباً؟</span>
          <a href="signup.html" data-i18n="signup_link">أنشئ مؤسسة جديدة</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/saas-brand.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script src="js/saas/saas-i18n.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => SaaSI18n.t(k);
    const msg = (t, cls) => { $('msg').className = 'saas-msg ' + (cls || ''); $('msg').textContent = t; };
    document.addEventListener('DOMContentLoaded', () => SaaSI18n.init());
    (async () => { const s = await SaaS.getSession(); if (s) location.replace('/'); })();
    async function doLogin() {
      const email = $('email').value.trim(), pwd = $('pwd').value;
      if (!email || !pwd) { msg(T('err_fill_both'), 'err'); return; }
      $('go').disabled = true; msg(T('login_filling'));
      const r = await SaaS.signIn(email, pwd);
      if (r.error) { msg(r.error.message || T('err_login_failed'), 'err'); $('go').disabled = false; return; }
      msg(T('login_ok'), 'ok');
      setTimeout(() => location.replace('/'), 500);
    }
  </script>
</body>
</html>
