<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل الدخول — HSE SaaS</title>
<style>
  *{box-sizing:border-box}
  body{font-family:Tahoma,Arial,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:linear-gradient(135deg,#0f172a,#1e3a5f,#1e40af);color:#e2e8f0;padding:20px}
  .card{background:#fff;color:#1e293b;border-radius:18px;box-shadow:0 25px 60px rgba(0,0,0,.35);width:100%;max-width:420px;overflow:hidden}
  .hd{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;padding:22px 26px;text-align:center}
  .hd h1{margin:0;font-size:1.35rem}.hd p{margin:6px 0 0;font-size:.82rem;opacity:.85}
  .bd{padding:24px 26px}
  label{display:block;font-size:.82rem;font-weight:700;color:#475569;margin:12px 0 5px}
  input{width:100%;height:44px;padding:0 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.92rem;outline:none;transition:.15s}
  input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  button{width:100%;height:46px;margin-top:18px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);
         color:#fff;font-weight:700;font-size:.95rem;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:12px;font-size:.84rem;min-height:20px}.err{color:#dc2626}.ok{color:#16a34a}
  .foot{text-align:center;margin-top:14px;font-size:.84rem;color:#64748b}
  a{color:#2563eb;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="hd"><h1>🛡️ تسجيل الدخول</h1><p>منصّة إدارة السلامة المهنية (HSE)</p></div>
    <div class="bd">
      <label>البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="you@company.com">
      <label>كلمة المرور</label>
      <input id="pwd" type="password" placeholder="••••••••">
      <button id="go" onclick="doLogin()">دخول</button>
      <div class="msg" id="msg"></div>
      <div class="foot">لا تملك حساباً؟ <a href="signup.html">أنشئ مؤسسة جديدة</a></div>
    </div>
  </div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const msg = (t, cls) => { $('msg').className='msg '+(cls||''); $('msg').textContent=t; };
    (async()=>{ const s=await SaaS.getSession(); if(s) location.href='index.html'; })();
    async function doLogin(){
      const email=$('email').value.trim(), pwd=$('pwd').value;
      if(!email||!pwd){ msg('أدخل البريد وكلمة المرور','err'); return; }
      $('go').disabled=true; msg('جاري الدخول...');
      const r = await SaaS.signIn(email,pwd);
      if(r.error){ msg(r.error.message||'فشل الدخول','err'); $('go').disabled=false; return; }
      msg('تم! جارٍ فتح التطبيق...','ok');
      setTimeout(()=> location.href='index.html', 500);
    }
  </script>
</body>
</html>
