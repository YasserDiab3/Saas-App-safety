<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تشغيل المنصّة — HSEHub 360</title>
<meta name="description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta name="application-name" content="HSEHub 360">
<link rel="icon" type="image/png" href="assets/brand/favicon.png">
<link rel="stylesheet" href="css/saas-pages.css">
</head>
<body data-i18n-title="pf_doctitle">
  <div id="login" class="saas-shell" style="display:none">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="assets/brand/logo.png" alt="HSEHub 360" class="saas-logo-img"></div>
        <h1 data-i18n="pf_login_title">دخول مدير المنصّة</h1>
        <p data-i18n="brand_sub">HSEHub 360 — السلامة • الصحة • البيئة</p>
      </div>
      <div class="saas-body">
        <div class="saas-field"><label data-i18n="f_email">البريد</label>
          <input id="email" class="saas-input" type="email" data-i18n-ph="ph_email"></div>
        <div class="saas-field"><label data-i18n="f_password">كلمة المرور</label>
          <input id="pwd" class="saas-input" type="password" data-i18n-ph="ph_pwd"></div>
        <button class="saas-btn" data-i18n="btn_login" onclick="doLogin()">دخول</button>
        <div class="saas-msg err" id="lmsg"></div>
      </div>
    </div>
  </div>

  <div id="panel" class="saas-page" style="display:none">
    <div class="saas-page-hd">
      <h1>⚙️ <span data-i18n="pf_console_title">لوحة تشغيل المنصّة</span></h1>
      <span class="saas-pill" id="who"></span>
    </div>

    <nav class="pf-tabs" id="tabs">
      <button type="button" class="pf-tab active" data-tab="overview" data-i18n="pf_tab_overview">نظرة عامة</button>
      <button type="button" class="pf-tab" data-tab="tenants" data-i18n="pf_tab_tenants">المؤسسات</button>
      <button type="button" class="pf-tab" data-tab="users" data-i18n="pf_tab_users">المستخدمون</button>
      <button type="button" class="pf-tab" data-tab="billing" data-i18n="pf_tab_billing">الفوترة</button>
      <button type="button" class="pf-tab" data-tab="plans" data-i18n="pf_tab_plans">الخطط</button>
    </nav>

    <div id="pane-overview" class="pf-pane active">
      <div class="pf-kpis" id="kpis"></div>
      <div class="saas-panel">
        <h2 style="margin:0 0 12px;font-size:1rem" data-i18n="pf_recent_tenants">آخر المؤسسات المسجّلة</h2>
        <div class="pf-table-wrap" id="recent-tenants"></div>
      </div>
    </div>

    <div id="pane-tenants" class="pf-pane">
      <div class="saas-panel">
        <div class="pf-toolbar">
          <input type="search" id="tenant-search" data-i18n-ph="pf_search" placeholder="بحث…">
          <button type="button" class="saas-btn sm" id="tenant-search-btn" data-i18n="pf_search_btn">بحث</button>
        </div>
        <div class="pf-table-wrap" id="tenants-table"></div>
        <div class="pf-pager" id="tenants-pager"></div>
      </div>
    </div>

    <div id="pane-users" class="pf-pane">
      <div class="saas-panel">
        <div class="pf-toolbar">
          <input type="search" id="user-search" data-i18n-ph="pf_search" placeholder="بحث…">
          <button type="button" class="saas-btn sm" id="user-search-btn" data-i18n="pf_search_btn">بحث</button>
        </div>
        <div class="pf-table-wrap" id="users-table"></div>
        <div class="pf-pager" id="users-pager"></div>
      </div>
    </div>

    <div id="pane-billing" class="pf-pane">
      <div class="saas-panel">
        <div class="pf-toolbar">
          <label class="muted-s" data-i18n="pf_filter_status">تصفية بالحالة</label>
          <select id="billing-filter">
            <option value="" data-i18n="pf_filter_all">الكل</option>
            <option value="active">active</option>
            <option value="trialing">trialing</option>
            <option value="past_due">past_due</option>
            <option value="frozen">frozen</option>
            <option value="canceled">canceled</option>
          </select>
        </div>
        <div class="pf-table-wrap" id="billing-table"></div>
        <div class="pf-pager" id="billing-pager"></div>
      </div>
    </div>

    <div id="pane-plans" class="pf-pane">
      <div id="plans"></div>
      <p class="muted-s" data-i18n="pf_note" style="color:#cbd5e1"></p>
    </div>
  </div>

  <div id="modal-root" style="display:none"></div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/saas-brand.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script src="js/saas/saas-escape.js"></script>
  <script src="js/saas/saas-i18n.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => SaaSI18n.t(k);
    const esc = s => SaaSEscape.html(s);
    const PAGE_SIZE = 50;

    const MODULES = [
      ['clinic','العيادة','Clinic'],['incidents','الحوادث','Incidents'],
      ['nearmiss','الحوادث الوشيكة','Near-miss'],['daily-observations','الملاحظات اليومية','Daily Observations'],
      ['user-tasks','مهام المستخدمين','User Tasks'],['ppe','معدات الوقاية','PPE'],
      ['violations','المخالفات','Violations'],['training','التدريب','Training'],
      ['contractors','المقاولون','Contractors'],['employees','الموظفون','Employees'],
      ['chemical-safety','السلامة الكيميائية','Chemical Safety'],['fire-equipment','معدات الحريق','Fire Equipment'],
      ['periodic-inspections','الفحوصات الدورية','Periodic Inspections'],['ptw','تصاريح العمل','PTW'],
      ['risk-assessment','تقييم المخاطر','Risk Assessment'],['emergency','الطوارئ','Emergency'],
      ['safety-budget','ميزانية السلامة','Safety Budget'],['safety-performance-kpis','مؤشرات الأداء','Performance KPIs'],
      ['safety-health-management','إدارة الصحة والسلامة','Health & Safety Mgmt'],['sustainability','الاستدامة','Sustainability'],
      ['behavior-monitoring','مراقبة السلوك','Behavior Monitoring'],['action-tracking','تتبع الإجراءات','Action Tracking'],
      ['legal-documents','المستندات القانونية','Legal Documents'],['iso','نظام ISO','ISO'],
      ['sop-jha','SOP / JHA','SOP / JHA'],['change-management','إدارة التغيير','Change Management'],
      ['issuing-authorities','جهات الإصدار','Issuing Authorities'],['ai-assistant','المساعد الذكي','AI Assistant']
    ];
    const modLabel = m => SaaSI18n.lang === 'ar' ? m[1] : m[2];

    let _plans = null;
    let _state = {
      tenants: { offset: 0, search: '' },
      users: { offset: 0, search: '' },
      billing: { offset: 0, status: '' }
    };

    const locale = () => SaaSI18n.lang === 'ar' ? 'ar-EG' : 'en-US';
    const fmtDate = v => v ? new Date(v).toLocaleDateString(locale()) : '—';
    const badge = st => {
      const cls = (st === 'active' || st === 'trialing') ? 'ok' : (st === 'past_due' ? 'warn' : 'err');
      return `<span class="badge ${cls}">${esc(st || '—')}</span>`;
    };

    document.addEventListener('DOMContentLoaded', () => {
      SaaSI18n.init(() => {
        if (_plans) renderPlans(_plans);
        const active = document.querySelector('.pf-tab.active');
        if (active) loadTab(active.getAttribute('data-tab'));
      });
      $('tabs').addEventListener('click', e => {
        const btn = e.target.closest('.pf-tab');
        if (!btn) return;
        document.querySelectorAll('.pf-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pf-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        $('pane-' + btn.getAttribute('data-tab')).classList.add('active');
        loadTab(btn.getAttribute('data-tab'));
      });
      $('tenant-search-btn').onclick = () => { _state.tenants.offset = 0; _state.tenants.search = $('tenant-search').value.trim(); loadTenants(); };
      $('user-search-btn').onclick = () => { _state.users.offset = 0; _state.users.search = $('user-search').value.trim(); loadUsers(); };
      $('billing-filter').onchange = () => { _state.billing.offset = 0; _state.billing.status = $('billing-filter').value; loadBilling(); };
    });

    (async () => {
      const s = await SaaS.getSession();
      if (!s) { $('login').style.display = 'flex'; return; }
      await initPanel();
    })();

    async function doLogin() {
      const r = await SaaS.signIn($('email').value.trim(), $('pwd').value);
      if (r.error) { $('lmsg').textContent = r.error.message || T('err_login_failed'); return; }
      $('login').style.display = 'none';
      await initPanel();
    }

    async function initPanel() {
      const client = SaaS.client();
      const { data, error } = await client.rpc('api_admin_list_plans');
      if (error) {
        document.body.innerHTML = '<div class="saas-page"><div class="saas-panel" style="color:#b91c1c">' + esc(T('pf_forbidden')) + '</div></div>';
        return;
      }
      $('panel').style.display = 'block';
      $('who').textContent = T('pf_who');
      _plans = data || [];
      renderPlans(_plans);
      loadTab('overview');
    }

    function loadTab(tab) {
      if (tab === 'overview') loadOverview();
      else if (tab === 'tenants') loadTenants();
      else if (tab === 'users') loadUsers();
      else if (tab === 'billing') loadBilling();
    }

    async function loadOverview() {
      $('kpis').innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
      $('recent-tenants').innerHTML = '';
      const { data, error } = await SaaS.client().rpc('api_admin_overview');
      if (error) { $('kpis').innerHTML = `<p class="err">${esc(error.message)}</p>`; return; }
      const kpis = [
        ['pf_kpi_tenants', data.tenants_total],
        ['pf_kpi_users', data.users_total],
        ['pf_kpi_active_subs', data.active_subscriptions],
        ['pf_kpi_trialing', data.trialing],
        ['pf_kpi_past_due', data.past_due],
        ['pf_kpi_frozen', data.frozen]
      ];
      $('kpis').innerHTML = kpis.map(([k, n]) =>
        `<div class="pf-kpi"><div class="n">${esc(String(n ?? 0))}</div><div class="l">${esc(T(k))}</div></div>`
      ).join('');
      const rows = data.recent_tenants || [];
      $('recent-tenants').innerHTML = rows.length
        ? `<table class="pf-table"><thead><tr>
            <th>${esc(T('pf_col_name'))}</th><th>${esc(T('pf_col_org_code'))}</th>
            <th>${esc(T('pf_col_plan'))}</th><th>${esc(T('pf_col_status'))}</th>
            <th>${esc(T('pf_col_created'))}</th></tr></thead><tbody>${
          rows.map(r => `<tr>
            <td class="clickable" onclick="showTenant('${esc(r.id)}')">${esc(r.name)}</td>
            <td><code>${esc(r.org_code)}</code></td>
            <td>${esc(r.plan_id)}</td><td>${badge(r.status)}</td>
            <td>${esc(fmtDate(r.created_at))}</td></tr>`).join('')
        }</tbody></table>`
        : `<p class="muted-s">${esc(T('pf_no_rows'))}</p>`;
    }

    async function loadTenants() {
      $('tenants-table').innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
      const st = _state.tenants;
      const { data, error } = await SaaS.client().rpc('api_admin_list_tenants', {
        p_limit: PAGE_SIZE, p_offset: st.offset,
        p_search: st.search || null
      });
      if (error) { $('tenants-table').innerHTML = `<p class="err">${esc(error.message)}</p>`; return; }
      const items = data.items || [];
      $('tenants-table').innerHTML = items.length
        ? `<table class="pf-table"><thead><tr>
            <th>${esc(T('pf_col_name'))}</th><th>${esc(T('pf_col_org_code'))}</th>
            <th>${esc(T('pf_col_plan'))}</th><th>${esc(T('pf_col_status'))}</th>
            <th>${esc(T('pf_col_members'))}</th><th>${esc(T('lbl_trial'))}</th>
            <th>${esc(T('pf_col_created'))}</th><th>${esc(T('pf_actions'))}</th></tr></thead><tbody>${
          items.map(r => `<tr>
            <td class="clickable" onclick="showTenant('${esc(r.id)}')">${esc(r.name)}</td>
            <td><code>${esc(r.org_code)}</code></td>
            <td>${esc(r.plan_id)}</td><td>${badge(r.status)}</td>
            <td>${esc(String(r.member_count ?? 0))}</td>
            <td>${esc(fmtDate(r.trial_ends_at))}</td>
            <td>${esc(fmtDate(r.created_at))}</td>
            <td style="white-space:normal">
              <button type="button" class="saas-btn sm ghost" onclick="quickTenantAction('${esc(r.id)}','activate')">${esc(T('pf_activate'))}</button>
              <button type="button" class="saas-btn sm ghost" onclick="quickTenantAction('${esc(r.id)}','freeze')">${esc(T('pf_freeze'))}</button>
              <button type="button" class="saas-btn sm" onclick="showTenant('${esc(r.id)}')">${esc(T('pf_manage'))}</button>
            </td></tr>`).join('')
        }</tbody></table>`
        : `<p class="muted-s">${esc(T('pf_no_rows'))}</p>`;
      renderPager('tenants-pager', data.total, st.offset, dir => {
        st.offset = Math.max(0, st.offset + dir * PAGE_SIZE);
        loadTenants();
      });
    }

    async function loadUsers() {
      $('users-table').innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
      const st = _state.users;
      const { data, error } = await SaaS.client().rpc('api_admin_list_users', {
        p_limit: PAGE_SIZE, p_offset: st.offset,
        p_search: st.search || null
      });
      if (error) { $('users-table').innerHTML = `<p class="err">${esc(error.message)}</p>`; return; }
      const items = data.items || [];
      $('users-table').innerHTML = items.length
        ? `<table class="pf-table"><thead><tr>
            <th>${esc(T('pf_col_email'))}</th><th>${esc(T('pf_col_name'))}</th>
            <th>${esc(T('pf_col_confirmed'))}</th>            <th>${esc(T('pf_col_memberships'))}</th>
            <th>${esc(T('pf_col_created'))}</th><th>${esc(T('pf_actions'))}</th></tr></thead><tbody>${
          items.map(r => {
            const mems = (r.memberships || []).map(m =>
              `<a href="#" class="saas-link" style="color:var(--brand-600)" onclick="event.preventDefault();showTenant('${esc(m.tenant_id)}')">${esc(m.tenant_name)} (${esc(m.role)})</a>`
            ).join(' · ') || '—';
            const firstTenant = (r.memberships || [])[0];
            return `<tr>
              <td>${esc(r.email)}</td>
              <td>${esc(r.full_name || '—')}${r.is_platform_admin ? ' 🛡' : ''}</td>
              <td>${esc(r.email_confirmed ? T('pf_yes') : T('pf_no'))}</td>
              <td style="white-space:normal;min-width:200px">${mems}</td>
              <td>${esc(fmtDate(r.created_at))}</td>
              <td>${firstTenant ? `<button type="button" class="saas-btn sm" onclick="showTenant('${esc(firstTenant.tenant_id)}')">${esc(T('pf_manage'))}</button>` : '—'}</td></tr>`;
          }).join('')
        }</tbody></table>`
        : `<p class="muted-s">${esc(T('pf_no_rows'))}</p>`;
      renderPager('users-pager', data.total, st.offset, dir => {
        st.offset = Math.max(0, st.offset + dir * PAGE_SIZE);
        loadUsers();
      });
    }

    async function loadBilling() {
      $('billing-table').innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
      const st = _state.billing;
      const { data, error } = await SaaS.client().rpc('api_admin_list_billing', {
        p_limit: PAGE_SIZE, p_offset: st.offset,
        p_status: st.status || null
      });
      if (error) { $('billing-table').innerHTML = `<p class="err">${esc(error.message)}</p>`; return; }
      const items = data.items || [];
      $('billing-table').innerHTML = items.length
        ? `<table class="pf-table"><thead><tr>
            <th>${esc(T('pf_col_name'))}</th><th>${esc(T('pf_col_org_code'))}</th>
            <th>${esc(T('pf_col_plan'))}</th><th>${esc(T('pf_col_status'))}</th>
            <th>Sub</th><th>${esc(T('pf_col_renewal'))}</th>
            <th>${esc(T('pf_col_stripe'))}</th></tr></thead><tbody>${
          items.map(r => `<tr>
            <td class="clickable" onclick="showTenant('${esc(r.tenant_id)}')">${esc(r.tenant_name)}</td>
            <td><code>${esc(r.org_code)}</code></td>
            <td>${esc(r.plan_id)}</td>
            <td>${badge(r.tenant_status)}</td>
            <td>${badge(r.sub_status)}</td>
            <td>${esc(fmtDate(r.current_period_end))}</td>
            <td dir="ltr" style="font-size:.75rem">${esc(r.stripe_customer_id || '—')}</td></tr>`).join('')
        }</tbody></table>`
        : `<p class="muted-s">${esc(T('pf_no_rows'))}</p>`;
      renderPager('billing-pager', data.total, st.offset, dir => {
        st.offset = Math.max(0, st.offset + dir * PAGE_SIZE);
        loadBilling();
      });
    }

    const TENANT_STATUSES = ['trialing', 'active', 'past_due', 'frozen', 'canceled'];
    const MEMBER_ROLES = ['owner', 'admin', 'safety_officer', 'user'];
    const MEMBER_STATUSES = ['active', 'invited', 'disabled'];
    let _currentTenantId = null;

    function toDateInput(v) {
      if (!v) return '';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return '';
      return d.toISOString().slice(0, 10);
    }

    function planOptions(cur) {
      return (_plans || []).map(p =>
        `<option value="${esc(p.id)}" ${p.id === cur ? 'selected' : ''}>${esc(p.name || p.id)}</option>`
      ).join('');
    }

    function selectOpts(list, cur) {
      return list.map(v => `<option value="${esc(v)}" ${v === cur ? 'selected' : ''}>${esc(v)}</option>`).join('');
    }

    async function adminRpc(name, body) {
      const r = await SaaS.client().rpc(name, body);
      if (r.error) throw new Error(r.error.message);
      return r.data;
    }

    async function quickTenantAction(id, action) {
      try {
        if (action === 'freeze') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_status: 'frozen' });
        else if (action === 'activate') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_status: 'active' });
        else if (action === 'extend7') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_extend_trial_days: 7, p_status: 'trialing' });
        else if (action === 'extend30') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_extend_trial_days: 30, p_status: 'trialing' });
        loadTenants();
        if (_currentTenantId === id) showTenant(id);
      } catch (e) { alert(e.message); }
    }

    async function saveTenantAdmin(tenantId) {
      const msg = $('tenant-admin-msg');
      msg.textContent = T('pf_saving'); msg.className = 'pf-msg';
      try {
        const trialDate = $('adm-trial-date').value;
        const body = {
          p_tenant_id: tenantId,
          p_status: $('adm-status').value,
          p_plan_id: $('adm-plan').value
        };
        if (trialDate) body.p_trial_ends_at = new Date(trialDate + 'T23:59:59').toISOString();
        await adminRpc('api_admin_update_tenant', body);
        msg.textContent = T('pf_saved_ok'); msg.className = 'pf-msg ok';
        loadTenants(); loadBilling();
        showTenant(tenantId);
      } catch (e) { msg.textContent = e.message; msg.className = 'pf-msg err'; }
    }

    async function saveMemberAdmin(tenantId, userId) {
      const msg = $(`mem-msg-${userId}`);
      if (msg) { msg.textContent = T('pf_saving'); msg.className = 'pf-msg'; }
      try {
        await adminRpc('api_admin_set_member', {
          p_tenant_id: tenantId,
          p_user_id: userId,
          p_role: $(`mem-role-${userId}`).value,
          p_status: $(`mem-status-${userId}`).value
        });
        if (msg) { msg.textContent = T('pf_saved_ok'); msg.className = 'pf-msg ok'; }
        loadUsers();
        showTenant(tenantId);
      } catch (e) { if (msg) { msg.textContent = e.message; msg.className = 'pf-msg err'; } }
    }

    function renderPager(elId, total, offset, onNav) {
      const el = $(elId);
      const page = Math.floor(offset / PAGE_SIZE) + 1;
      const pages = Math.max(1, Math.ceil((total || 0) / PAGE_SIZE));
      el.innerHTML = `
        <span>${esc(T('pf_page'))} ${page} / ${pages} (${total || 0})</span>
        <button type="button" class="saas-btn sm ghost" ${offset <= 0 ? 'disabled' : ''} data-dir="-1">${esc(T('pf_prev'))}</button>
        <button type="button" class="saas-btn sm ghost" ${offset + PAGE_SIZE >= total ? 'disabled' : ''} data-dir="1">${esc(T('pf_next'))}</button>`;
      el.querySelectorAll('button[data-dir]').forEach(b => {
        b.onclick = () => onNav(parseInt(b.getAttribute('data-dir'), 10));
      });
    }

    async function showTenant(id) {
      _currentTenantId = id;
      const root = $('modal-root');
      root.style.display = 'flex';
      root.className = 'pf-modal-backdrop';
      root.innerHTML = `<div class="pf-modal"><p>${esc(T('pf_loading'))}</p></div>`;
      root.onclick = e => { if (e.target === root) closeModal(); };
      const { data, error } = await SaaS.client().rpc('api_admin_get_tenant', { p_tenant_id: id });
      if (error) {
        root.innerHTML = `<div class="pf-modal"><p class="err">${esc(error.message)}</p>
          <button type="button" class="saas-btn sm" onclick="closeModal()">${esc(T('pf_close'))}</button></div>`;
        return;
      }
      const t = data.tenant || {};
      const lim = data.limits || {};
      const sub = data.subscription || {};
      const tid = esc(t.id);
      const members = (data.members || []).map(m => {
        const uid = esc(m.user_id);
        return `<tr>
          <td>${esc(m.email)}</td><td>${esc(m.full_name || '—')}</td>
          <td><select id="mem-role-${uid}">${selectOpts(MEMBER_ROLES, m.role)}</select></td>
          <td><select id="mem-status-${uid}">${selectOpts(MEMBER_STATUSES, m.status)}</select></td>
          <td>
            <button type="button" class="saas-btn sm" onclick="saveMemberAdmin('${tid}','${uid}')">${esc(T('pf_member_save'))}</button>
            <div class="pf-msg" id="mem-msg-${uid}"></div>
          </td></tr>`;
      }).join('');
      root.innerHTML = `<div class="pf-modal" onclick="event.stopPropagation()">
        <h2>${esc(T('pf_detail_title'))}: ${esc(t.name)}</h2>
        <dl class="pf-modal-dl">
          <dt>${esc(T('pf_col_org_code'))}</dt><dd><code>${esc(t.org_code)}</code></dd>
          <dt>${esc(T('lbl_seats'))}</dt><dd>${esc(String(lim.user_count ?? 0))} + ${esc(String(lim.pending_invites ?? 0))} / ${esc(String(lim.max_users ?? '—'))}</dd>
          <dt>${esc(T('lbl_storage'))}</dt><dd>${esc(String(lim.storage_used_mb ?? 0))} / ${esc(String(lim.storage_mb ?? '—'))} MB</dd>
          <dt>Sub</dt><dd>${badge(sub.status)} ${esc(fmtDate(sub.current_period_end))}</dd>
          <dt>${esc(T('pf_col_stripe'))}</dt><dd dir="ltr">${esc(t.stripe_customer_id || '—')}</dd>
        </dl>
        <div class="pf-actions">
          <h3>${esc(T('pf_actions'))}</h3>
          <div class="row">
            <label class="muted-s">${esc(T('pf_col_status'))}
              <select id="adm-status">${selectOpts(TENANT_STATUSES, t.status)}</select></label>
            <label class="muted-s">${esc(T('pf_col_plan'))}
              <select id="adm-plan">${planOptions(t.plan_id)}</select></label>
            <label class="muted-s">${esc(T('lbl_trial'))}
              <input type="date" id="adm-trial-date" value="${esc(toDateInput(t.trial_ends_at))}"></label>
          </div>
          <div class="row" style="margin-top:10px">
            <button type="button" class="saas-btn sm ghost" onclick="quickTenantAction('${tid}','extend7')">${esc(T('pf_extend_7'))}</button>
            <button type="button" class="saas-btn sm ghost" onclick="quickTenantAction('${tid}','extend30')">${esc(T('pf_extend_30'))}</button>
            <button type="button" class="saas-btn sm ghost" onclick="quickTenantAction('${tid}','freeze')">${esc(T('pf_freeze'))}</button>
            <button type="button" class="saas-btn sm ghost" onclick="quickTenantAction('${tid}','activate')">${esc(T('pf_activate'))}</button>
            <button type="button" class="saas-btn sm" onclick="saveTenantAdmin('${tid}')">${esc(T('pf_save_tenant'))}</button>
          </div>
          <div class="pf-msg" id="tenant-admin-msg"></div>
        </div>
        <h3 style="margin:16px 0 8px;font-size:.95rem">${esc(T('pf_col_members'))}</h3>
        <div class="pf-table-wrap"><table class="pf-table"><thead><tr>
          <th>${esc(T('pf_col_email'))}</th><th>${esc(T('pf_col_name'))}</th>
          <th>${esc(T('pf_role'))}</th><th>${esc(T('pf_col_status'))}</th><th></th></tr></thead>
          <tbody>${members || `<tr><td colspan="5">${esc(T('pf_no_rows'))}</td></tr>`}</tbody></table></div>
        <button type="button" class="saas-btn sm" style="margin-top:14px" onclick="closeModal()">${esc(T('pf_close'))}</button>
      </div>`;
    }

    function closeModal() {
      _currentTenantId = null;
      const root = $('modal-root');
      root.style.display = 'none';
      root.innerHTML = '';
      root.className = '';
    }

    function renderPlans(plans) {
      $('plans').innerHTML = '';
      (plans || []).forEach(p => {
        const allowed = Array.isArray(p.modules) ? p.modules : [];
        const allMode = allowed.length === 0;
        const card = document.createElement('div');
        card.className = 'plan-card';
        card.innerHTML =
          `<div class="ph"><b>${esc(p.name)} (${esc(p.id)})</b>
             <span class="muted-s">${allMode ? esc(T('pf_all_modules')) : ''}</span></div>
           <div class="row" style="margin:0 0 12px">
             <label class="muted-s">${esc(T('pf_max_users'))}
               <input type="number" min="1" id="u-${esc(p.id)}" value="${esc(String(p.max_users))}" class="lim-input"></label>
             <label class="muted-s">${esc(T('pf_storage'))}
               <input type="number" min="1" id="s-${esc(p.id)}" value="${esc(String(p.storage_mb))}" class="lim-input"></label>
           </div>
           <div class="mod-grid">${MODULES.map(m =>
             `<label class="mod"><input type="checkbox" data-k="${esc(m[0])}" ${(allMode || allowed.includes(m[0])) ? 'checked' : ''}> ${esc(modLabel(m))}</label>`
           ).join('')}</div>
           <div class="row">
             <button type="button" class="saas-btn sm ghost" onclick="setAll(this,true)">${esc(T('pf_select_all'))}</button>
             <button type="button" class="saas-btn sm ghost" onclick="setAll(this,false)">${esc(T('pf_clear_all'))}</button>
             <button type="button" class="saas-btn sm" data-plan="${esc(p.id)}" onclick="savePlan(this)">${esc(T('pf_save'))} · ${esc(p.name)}</button>
             <span class="msg-inline" id="m-${esc(p.id)}"></span>
           </div>`;
        $('plans').appendChild(card);
      });
    }

    function setAll(btn, val) {
      btn.closest('.plan-card').querySelectorAll('input[type=checkbox]').forEach(c => c.checked = val);
    }

    async function savePlan(btn) {
      const card = btn.closest('.plan-card');
      const planId = btn.getAttribute('data-plan');
      const mods = Array.from(card.querySelectorAll('input[type=checkbox]:checked')).map(c => c.getAttribute('data-k'));
      const payload = (mods.length === MODULES.length) ? [] : mods;
      const maxUsers = parseInt($('u-' + planId).value, 10);
      const storageMb = parseInt($('s-' + planId).value, 10);
      const m = $('m-' + planId); m.textContent = T('pf_saving'); m.className = 'msg-inline';
      const client = SaaS.client();
      const r1 = await client.rpc('api_admin_set_plan_modules', { p_plan_id: planId, p_modules: payload });
      if (r1.error) { m.textContent = '⛔ ' + r1.error.message; m.className = 'msg-inline err'; return; }
      const r2 = await client.rpc('api_admin_set_plan_limits', {
        p_plan_id: planId,
        p_max_users: Number.isFinite(maxUsers) ? maxUsers : null,
        p_storage_mb: Number.isFinite(storageMb) ? storageMb : null
      });
      if (r2.error) { m.textContent = '⛔ ' + r2.error.message; m.className = 'msg-inline err'; return; }
      m.textContent = T('pf_saved'); m.className = 'msg-inline ok';
    }
  </script>
</body>
</html>
