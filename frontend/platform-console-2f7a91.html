<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تشغيل المنصّة — HSEHub 360</title>
<meta name="description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta name="application-name" content="HSEHub 360">
<link rel="icon" type="image/png" href="assets/brand/favicon.png">
<link rel="stylesheet" href="css/saas-pages.css">
</head>
<body data-i18n-title="pf_doctitle">
  <div id="login" class="saas-shell" style="display:none">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="assets/brand/logo.png" alt="HSEHub 360" class="saas-logo-img"></div>
        <h1 data-i18n="pf_login_title">دخول مدير المنصّة</h1>
        <p data-i18n="brand_sub">HSEHub 360 — السلامة • الصحة • البيئة</p>
      </div>
      <div class="saas-body">
        <div class="saas-field"><label data-i18n="f_email">البريد</label>
          <input id="email" class="saas-input" type="email" data-i18n-ph="ph_email"></div>
        <div class="saas-field"><label data-i18n="f_password">كلمة المرور</label>
          <input id="pwd" class="saas-input" type="password" data-i18n-ph="ph_pwd"></div>
        <button class="saas-btn" data-i18n="btn_login" onclick="doLogin()">دخول</button>
        <div class="saas-msg err" id="lmsg"></div>
      </div>
    </div>
  </div>

  <div id="panel" class="saas-page pf-console-page" style="display:none">
    <header class="pf-topbar">
      <div class="pf-topbar-brand">
        <img src="assets/brand/logo.png" alt="HSEHub 360" class="pf-topbar-logo">
        <div>
          <h1 data-i18n="pf_console_title">لوحة تشغيل المنصّة</h1>
          <p class="pf-topbar-sub" data-i18n="brand_sub">HSEHub 360 — السلامة • الصحة • البيئة</p>
        </div>
      </div>
      <span class="saas-pill pf-role-pill" id="who"></span>
    </header>

    <nav class="pf-tabs pf-tabs-bar" id="tabs">
      <button type="button" class="pf-tab active" data-tab="overview" data-i18n="pf_tab_overview">نظرة عامة</button>
      <button type="button" class="pf-tab" data-tab="tenants" data-i18n="pf_tab_tenants">المؤسسات</button>
      <button type="button" class="pf-tab" data-tab="users" data-i18n="pf_tab_users">المستخدمون</button>
      <button type="button" class="pf-tab" data-tab="billing" data-i18n="pf_tab_billing">الفوترة</button>
      <button type="button" class="pf-tab" data-tab="plans" data-i18n="pf_tab_plans">الخطط</button>
      <button type="button" class="pf-tab" data-tab="messages" data-i18n="pf_tab_messages">الرسائل</button>
      <button type="button" class="pf-tab" data-tab="quotes" data-i18n="pf_tab_quotes">عروض الأسعار</button>
      <button type="button" class="pf-tab" data-tab="devices" data-i18n="pf_tab_devices">الأجهزة</button>
    </nav>

    <div id="pane-overview" class="pf-pane active">
      <div class="pf-kpis" id="kpis"></div>
      <div class="pf-content-card">
        <h2 class="pf-section-title" data-i18n="pf_recent_tenants">آخر المؤسسات المسجّلة</h2>
        <div class="pf-table-wrap" id="recent-tenants"></div>
      </div>
    </div>

    <div id="pane-tenants" class="pf-pane">
      <div class="pf-content-card">
        <div class="pf-section-hd">
          <h2 data-i18n="pf_tab_tenants">المؤسسات</h2>
          <div class="pf-toolbar pf-toolbar-search">
            <input type="search" id="tenant-search" class="pf-search-input" data-i18n-ph="pf_search" placeholder="بحث…">
            <button type="button" class="saas-btn sm pf-search-btn" id="tenant-search-btn" data-i18n="pf_search_btn">بحث</button>
          </div>
        </div>
        <div class="pf-table-wrap" id="tenants-table"></div>
        <div class="pf-pager" id="tenants-pager"></div>
      </div>
    </div>

    <div id="pane-users" class="pf-pane">
      <div class="pf-content-card">
        <div class="pf-section-hd">
          <h2 data-i18n="pf_tab_users">المستخدمون</h2>
          <div class="pf-toolbar pf-toolbar-search">
            <input type="search" id="user-search" class="pf-search-input" data-i18n-ph="pf_search" placeholder="بحث…">
            <button type="button" class="saas-btn sm pf-search-btn" id="user-search-btn" data-i18n="pf_search_btn">بحث</button>
          </div>
        </div>
        <div class="pf-table-wrap" id="users-table"></div>
        <div class="pf-pager" id="users-pager"></div>
      </div>
    </div>

    <div id="pane-billing" class="pf-pane">
      <div class="pf-content-card">
        <div class="pf-section-hd">
          <h2 data-i18n="pf_tab_billing">الفوترة</h2>
          <div class="pf-toolbar">
            <label class="pf-filter-label" data-i18n="pf_filter_status">تصفية بالحالة</label>
            <select id="billing-filter" class="pf-filter-select">
            <option value="" data-i18n="pf_filter_all">الكل</option>
            <option value="active">active</option>
            <option value="trialing">trialing</option>
            <option value="past_due">past_due</option>
            <option value="frozen">frozen</option>
            <option value="canceled">canceled</option>
          </select>
          </div>
        </div>
        <div class="pf-table-wrap" id="billing-table"></div>
        <div class="pf-pager" id="billing-pager"></div>
      </div>
    </div>

    <div id="pane-plans" class="pf-pane">
      <div class="pf-content-card">
        <div class="pf-section-hd"><h2 data-i18n="pf_tab_plans">الخطط</h2></div>
        <div class="pf-plans-wrap" id="plans"></div>
        <p class="pf-plans-note muted-s" data-i18n="pf_note"></p>
      </div>
    </div>

    <div id="pane-messages" class="pf-pane">
      <div class="pf-grid-2">
        <div class="pf-content-card">
          <div class="pf-section-hd"><h2 data-i18n="pf_msg_compose">إرسال رسالة</h2></div>
          <div class="pf-form">
            <label class="pf-field"><span data-i18n="pf_msg_tenant">المؤسسة</span>
              <select id="msg-tenant" class="pf-select"></select></label>
            <label class="pf-field"><span data-i18n="pf_msg_recipient">المستلم</span>
              <select id="msg-user" class="pf-select"><option value="" data-i18n="pf_msg_all_members">كل الأعضاء النشطين</option></select></label>
            <label class="pf-field"><span data-i18n="pf_msg_channel">القناة</span>
              <select id="msg-channel" class="pf-select">
                <option value="email" data-i18n="pf_msg_ch_email">بريد إلكتروني</option>
                <option value="in_app" data-i18n="pf_msg_ch_inapp">إشعار داخل التطبيق</option>
                <option value="both" data-i18n="pf_msg_ch_both">بريد + إشعار</option>
              </select></label>
            <label class="pf-field"><span data-i18n="pf_msg_subject">الموضوع</span>
              <input id="msg-subject" class="pf-input" type="text"></label>
            <label class="pf-field"><span data-i18n="pf_msg_body">النص</span>
              <textarea id="msg-body" class="pf-textarea" rows="5"></textarea></label>
            <button type="button" class="saas-btn sm pf-search-btn" id="msg-send" data-i18n="pf_msg_send">إرسال</button>
            <div class="pf-msg" id="msg-status"></div>
          </div>
        </div>
        <div class="pf-content-card">
          <div class="pf-section-hd"><h2 data-i18n="pf_msg_history">سجل الرسائل</h2></div>
          <div class="pf-table-wrap" id="msg-history"></div>
        </div>
      </div>
    </div>

    <div id="pane-quotes" class="pf-pane">
      <div class="pf-grid-2">
        <div class="pf-content-card">
          <div class="pf-section-hd"><h2 data-i18n="pf_quote_new">عرض سعر جديد</h2></div>
          <div class="pf-form">
            <label class="pf-field"><span data-i18n="pf_msg_tenant">المؤسسة</span>
              <select id="quote-tenant" class="pf-select"></select></label>
            <label class="pf-field"><span data-i18n="pf_col_plan">الخطة</span>
              <select id="quote-plan" class="pf-select"></select></label>
            <label class="pf-field"><span data-i18n="pf_quote_title">عنوان العرض</span>
              <input id="quote-title" class="pf-input" type="text"></label>
            <div class="pf-form-row">
              <label class="pf-field"><span data-i18n="pf_quote_amount">السعر (سنت)</span>
                <input id="quote-amount" class="pf-input" type="number" min="0" placeholder="9900"></label>
              <label class="pf-field"><span data-i18n="pf_quote_discount">خصم %</span>
                <input id="quote-discount" class="pf-input" type="number" min="0" max="100" value="0"></label>
            </div>
            <div class="pf-form-row">
              <label class="pf-field"><span data-i18n="pf_quote_trial_extra">أيام تجربة إضافية</span>
                <input id="quote-trial" class="pf-input" type="number" min="0" max="365" value="0"></label>
              <label class="pf-field"><span data-i18n="pf_quote_valid">صلاحية (يوم)</span>
                <input id="quote-valid" class="pf-input" type="number" min="1" max="365" value="30"></label>
            </div>
            <label class="pf-field"><span data-i18n="pf_quote_notes">ملاحظات</span>
              <textarea id="quote-notes" class="pf-textarea" rows="3"></textarea></label>
            <div class="row">
              <button type="button" class="saas-btn sm pf-search-btn" id="quote-create" data-i18n="pf_quote_save">حفظ العرض</button>
              <button type="button" class="saas-btn sm ghost pf-search-btn" id="quote-create-send" data-i18n="pf_quote_save_send">حفظ وإرسال</button>
            </div>
            <div class="pf-msg" id="quote-status"></div>
          </div>
        </div>
        <div class="pf-content-card">
          <div class="pf-section-hd"><h2 data-i18n="pf_tab_quotes">عروض الأسعار</h2></div>
          <div class="pf-table-wrap" id="quotes-table"></div>
        </div>
      </div>
    </div>

    <div id="pane-devices" class="pf-pane">
      <div class="pf-content-card">
        <div class="pf-section-hd">
          <h2 data-i18n="pf_tab_devices">الأجهزة</h2>
          <div class="pf-toolbar pf-toolbar-search">
            <input type="search" id="device-search" class="pf-search-input" data-i18n-ph="pf_dev_search_ph" placeholder="بحث…">
            <button type="button" class="saas-btn sm pf-search-btn" id="device-search-btn" data-i18n="pf_search_btn">بحث</button>
          </div>
        </div>
        <p class="pf-plans-note muted-s" data-i18n="pf_dev_note"></p>
        <div class="pf-table-wrap" id="devices-table"></div>
        <div class="pf-pager" id="devices-pager"></div>
      </div>
    </div>
  </div>

  <div id="modal-root" style="display:none"></div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/saas-brand.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script src="js/saas/saas-escape.js"></script>
  <script src="js/saas/saas-i18n.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => SaaSI18n.t(k);
    const esc = s => SaaSEscape.html(s);
    const PAGE_SIZE = 50;

    const MODULES = [
      ['clinic','العيادة','Clinic'],['incidents','الحوادث','Incidents'],
      ['nearmiss','الحوادث الوشيكة','Near-miss'],['daily-observations','الملاحظات اليومية','Daily Observations'],
      ['user-tasks','مهام المستخدمين','User Tasks'],['ppe','معدات الوقاية','PPE'],
      ['violations','المخالفات','Violations'],['training','التدريب','Training'],
      ['contractors','المقاولون','Contractors'],['employees','الموظفون','Employees'],
      ['chemical-safety','السلامة الكيميائية','Chemical Safety'],['fire-equipment','معدات الحريق','Fire Equipment'],
      ['periodic-inspections','الفحوصات الدورية','Periodic Inspections'],['ptw','تصاريح العمل','PTW'],
      ['risk-assessment','تقييم المخاطر','Risk Assessment'],['emergency','الطوارئ','Emergency'],
      ['safety-budget','ميزانية السلامة','Safety Budget'],['safety-performance-kpis','مؤشرات الأداء','Performance KPIs'],
      ['safety-health-management','إدارة الصحة والسلامة','Health & Safety Mgmt'],['sustainability','الاستدامة','Sustainability'],
      ['behavior-monitoring','مراقبة السلوك','Behavior Monitoring'],['action-tracking','تتبع الإجراءات','Action Tracking'],
      ['legal-documents','المستندات القانونية','Legal Documents'],['iso','نظام ISO','ISO'],
      ['sop-jha','SOP / JHA','SOP / JHA'],['change-management','إدارة التغيير','Change Management'],
      ['issuing-authorities','جهات الإصدار','Issuing Authorities'],['ai-assistant','المساعد الذكي','AI Assistant']
    ];
    const modLabel = m => SaaSI18n.lang === 'ar' ? m[1] : m[2];

    let _plans = null;
    let _state = {
      tenants: { offset: 0, search: '' },
      users: { offset: 0, search: '' },
      billing: { offset: 0, status: '' },
      devices: { offset: 0, search: '' }
    };

    const locale = () => SaaSI18n.lang === 'ar' ? 'ar-EG' : 'en-US';
    const fmtDate = v => v ? new Date(v).toLocaleDateString(locale()) : '—';
    const statusLabel = st => {
      const map = { trialing: 'st_trialing', active: 'st_active', past_due: 'st_past_due', frozen: 'st_frozen', canceled: 'st_canceled' };
      return map[st] ? T(map[st]) : (st || '—');
    };
    const badge = st => {
      const cls = (st === 'active' || st === 'trialing') ? 'ok' : (st === 'past_due' ? 'warn' : 'err');
      return `<span class="badge ${cls}">${esc(statusLabel(st))}</span>`;
    };
    const planBadge = id => {
      const p = String(id || 'free').toLowerCase();
      const cls = p === 'pro' ? 'pro' : p === 'enterprise' ? 'ent' : 'free';
      return `<span class="pf-plan pf-plan--${cls}">${esc(p)}</span>`;
    };
    const actRow = id => `
      <div class="pf-act-row">
        <button type="button" class="pf-btn-act pf-btn-act--ok" title="${esc(T('pf_activate'))}" onclick="quickTenantAction('${esc(id)}','activate')">${esc(T('pf_activate'))}</button>
        <button type="button" class="pf-btn-act pf-btn-act--warn" title="${esc(T('pf_freeze'))}" onclick="quickTenantAction('${esc(id)}','freeze')">${esc(T('pf_freeze'))}</button>
        <button type="button" class="pf-btn-act pf-btn-act--primary" onclick="showTenant('${esc(id)}')">${esc(T('pf_manage'))}</button>
      </div>`;

    document.addEventListener('DOMContentLoaded', () => {
      SaaSI18n.init(() => {
        if (_plans) renderPlans(_plans);
        const active = document.querySelector('.pf-tab.active');
        if (active) loadTab(active.getAttribute('data-tab'));
      });
      $('tabs').addEventListener('click', e => {
        const btn = e.target.closest('.pf-tab');
        if (!btn) return;
        document.querySelectorAll('.pf-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pf-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        $('pane-' + btn.getAttribute('data-tab')).classList.add('active');
        loadTab(btn.getAttribute('data-tab'));
      });
      $('tenant-search-btn').onclick = () => { _state.tenants.offset = 0; _state.tenants.search = $('tenant-search').value.trim(); loadTenants(); };
      $('tenant-search').onkeydown = e => { if (e.key === 'Enter') $('tenant-search-btn').click(); };
      $('user-search-btn').onclick = () => { _state.users.offset = 0; _state.users.search = $('user-search').value.trim(); loadUsers(); };
      $('user-search').onkeydown = e => { if (e.key === 'Enter') $('user-search-btn').click(); };
      $('device-search-btn').onclick = () => { _state.devices.offset = 0; _state.devices.search = $('device-search').value.trim(); loadDevices(); };
      $('device-search').onkeydown = e => { if (e.key === 'Enter') $('device-search-btn').click(); };
      $('billing-filter').onchange = () => { _state.billing.offset = 0; _state.billing.status = $('billing-filter').value; loadBilling(); };
      $('msg-tenant').onchange = onMsgTenantChange;
      $('msg-send').onclick = sendMessage;
      $('quote-create').onclick = () => createQuote(false);
      $('quote-create-send').onclick = () => createQuote(true);
    });

    (async () => {
      const s = await SaaS.getSession();
      if (!s) { $('login').style.display = 'flex'; return; }
      await initPanel();
    })();

    async function doLogin() {
      const r = await SaaS.signIn($('email').value.trim(), $('pwd').value);
      if (r.error) { $('lmsg').textContent = r.error.message || T('err_login_failed'); return; }
      $('login').style.display = 'none';
      await initPanel();
    }

    async function initPanel() {
      const client = SaaS.client();
      const { data, error } = await client.rpc('api_admin_list_plans');
      if (error) {
        document.body.innerHTML = '<div class="saas-page"><div class="saas-panel" style="color:#b91c1c">' + esc(T('pf_forbidden')) + '</div></div>';
        return;
      }
      $('panel').style.display = 'block';
      $('who').textContent = T('pf_who');
      _plans = data || [];
      renderPlans(_plans);
      await loadTenantOptions();
      loadTab('overview');
    }

    function loadTab(tab) {
      if (tab === 'overview') loadOverview();
      else if (tab === 'tenants') loadTenants();
      else if (tab === 'users') loadUsers();
      else if (tab === 'billing') loadBilling();
      else if (tab === 'plans') renderPlans(_plans || []);
      else if (tab === 'messages') loadMessagesPane();
      else if (tab === 'quotes') loadQuotesPane();
      else if (tab === 'devices') loadDevices();
    }

    let _tenantOptions = [];

    async function loadTenantOptions() {
      const { data, error } = await SaaS.client().rpc('api_admin_tenant_options');
      if (error) return;
      _tenantOptions = Array.isArray(data) ? data : [];
      fillTenantSelects();
    }

    function fillTenantSelects() {
      ['msg-tenant', 'quote-tenant'].forEach(id => {
        const el = $(id);
        if (!el) return;
        const cur = el.value;
        el.innerHTML = `<option value="">${esc(T('pf_msg_pick_tenant'))}</option>` +
          _tenantOptions.map(t =>
            `<option value="${esc(t.id)}">${esc(t.name)} (${esc(t.org_code)})</option>`
          ).join('');
        if (cur) el.value = cur;
      });
      const qp = $('quote-plan');
      if (qp && _plans) {
        qp.innerHTML = (_plans || []).map(p =>
          `<option value="${esc(p.id)}">${esc(p.name || p.id)}</option>`
        ).join('');
      }
    }

    async function onMsgTenantChange() {
      const tid = $('msg-tenant').value;
      const sel = $('msg-user');
      sel.innerHTML = `<option value="">${esc(T('pf_msg_all_members'))}</option>`;
      if (!tid) return;
      const { data } = await SaaS.client().rpc('api_admin_get_tenant_contacts', { p_tenant_id: tid });
      (data?.contacts || []).forEach(c => {
        const o = document.createElement('option');
        o.value = c.user_id;
        o.textContent = `${c.email || '—'} (${c.role})`;
        sel.appendChild(o);
      });
    }

    async function callAdminNotify(payload) {
      const s = await SaaS.getSession();
      if (!s?.access_token) throw new Error('not signed in');
      const url = SAAS_CONFIG.supabaseUrl.replace(/\/$/, '') + '/functions/v1/admin-notify';
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + s.access_token,
          apikey: SAAS_CONFIG.supabaseAnonKey
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.statusText || 'send failed');
      return data;
    }

    async function loadMessagesPane() {
      await loadTenantOptions();
      const hist = $('msg-history');
      hist.innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
      const { data, error } = await SaaS.client().rpc('api_admin_list_notifications', { p_limit: 20, p_offset: 0 });
      if (error) { hist.innerHTML = `<p class="err">${esc(error.message)}</p>`; return; }
      const items = data?.items || [];
      hist.innerHTML = items.length ? `<table class="pf-table"><thead><tr>
        <th>${esc(T('pf_col_created'))}</th><th>${esc(T('pf_msg_tenant'))}</th>
        <th>${esc(T('pf_msg_subject'))}</th><th>${esc(T('pf_col_status'))}</th></tr></thead><tbody>${
        items.map(n => `<tr>
          <td>${esc(fmtDate(n.created_at))}</td>
          <td>${esc(n.tenant_name || '—')}</td>
          <td>${esc(n.subject)}</td>
          <td>${esc(n.status)} · ${esc(n.channel)}</td></tr>`).join('')
      }</tbody></table>` : `<p class="muted-s">${esc(T('pf_no_rows'))}</p>`;
    }

    async function sendMessage() {
      const st = $('msg-status');
      st.textContent = T('pf_saving'); st.className = 'pf-msg';
      try {
        const tenantId = $('msg-tenant').value;
        if (!tenantId) throw new Error(T('pf_msg_pick_tenant'));
        const r = await callAdminNotify({
          action: 'notify',
          tenant_id: tenantId,
          user_id: $('msg-user').value || null,
          channel: $('msg-channel').value,
          subject: $('msg-subject').value.trim(),
          body: $('msg-body').value.trim()
        });
        st.textContent = T('pf_msg_sent') + ' (' + (r.sent || 0) + ')';
        st.className = 'pf-msg ok';
        loadMessagesPane();
      } catch (e) { st.textContent = e.message; st.className = 'pf-msg err'; }
    }

    async function loadQuotesPane() {
      await loadTenantOptions();
      const box = $('quotes-table');
      box.innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
      const { data, error } = await SaaS.client().rpc('api_admin_list_quotes', { p_limit: 30, p_offset: 0 });

    async function createQuote(andSend) {
      const st = $('quote-status');
      st.textContent = T('pf_saving'); st.className = 'pf-msg';
      try {
        const tenantId = $('quote-tenant').value;
        if (!tenantId) throw new Error(T('pf_msg_pick_tenant'));
        const title = $('quote-title').value.trim();
        if (!title) throw new Error(T('pf_quote_title_required'));
        const { data, error } = await SaaS.client().rpc('api_admin_create_quote', {
          p_tenant_id: tenantId,
          p_plan_id: $('quote-plan').value || 'pro',
          p_title: title,
          p_amount_cents: parseInt($('quote-amount').value, 10) || null,
          p_discount_percent: parseInt($('quote-discount').value, 10) || 0,
          p_extra_trial_days: parseInt($('quote-trial').value, 10) || 0,
          p_notes: $('quote-notes').value.trim() || null,
          p_valid_days: parseInt($('quote-valid').value, 10) || 30
        });
        if (error) throw new Error(error.message);
        if (andSend && data?.id) await sendQuote(data.id, false);
        st.textContent = T('pf_saved_ok'); st.className = 'pf-msg ok';
        loadQuotesPane();
      } catch (e) { st.textContent = e.message; st.className = 'pf-msg err'; }
    }

    async function sendQuote(quoteId, reload) {
      if (reload !== false) {
        const st = $('quote-status');
        if (st) { st.textContent = T('pf_saving'); st.className = 'pf-msg'; }
      }
      try {
        const r = await callAdminNotify({ action: 'quote', quote_id: quoteId });
        if (reload !== false) {
          $('quote-status').textContent = T('pf_quote_sent_ok') + ' (' + (r.sent || 0) + ')';
          $('quote-status').className = 'pf-msg ok';
          loadQuotesPane();
        }
      } catch (e) {
        if (reload !== false) {
          $('quote-status').textContent = e.message;
          $('quote-status').className = 'pf-msg err';
        } else throw e;
      }
    }

    function geoCell(lat, lng, source) {
      if (lat == null || lng == null) return '—';
      const la = Number(lat);
      const lo = Number(lng);
      if (!Number.isFinite(la) || !Number.isFinite(lo)) return '—';
      const href = `https://www.google.com/maps?q=${la},${lo}`;
      const label = la.toFixed(4) + ', ' + lo.toFixed(4);
      const src = source ? ` <span class="muted-s">(${esc(source)})</span>` : '';
      return `<a href="${href}" target="_blank" rel="noopener" class="saas-link" dir="ltr">${esc(label)}</a>${src}`;
    }

    function regionCell(r) {
      const parts = [r.city, r.region, r.country].filter(Boolean);
      return parts.length ? esc(parts.join(' · ')) : '—';

    function toDateInput(v) {
      if (!v) return '';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return '';
      return d.toISOString().slice(0, 10);
    }

    function planOptions(cur) {
      return (_plans || []).map(p =>
        `<option value="${esc(p.id)}" ${p.id === cur ? 'selected' : ''}>${esc(p.name || p.id)}</option>`
      ).join('');

      return list.map(v => `<option value="${esc(v)}" ${v === cur ? 'selected' : ''}>${esc(v)}</option>`).join('');
    }

    async function adminRpc(name, body) {
      const r = await SaaS.client().rpc(name, body);
      if (r.error) throw new Error(r.error.message);
      return r.data;
    }

    async function quickTenantAction(id, action) {
      try {
        if (action === 'freeze') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_status: 'frozen' });
        else if (action === 'activate') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_status: 'active' });
        else if (action === 'extend7') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_extend_trial_days: 7, p_status: 'trialing' });
        else if (action === 'extend30') await adminRpc('api_admin_update_tenant', { p_tenant_id: id, p_extend_trial_days: 30, p_status: 'trialing' });
        loadTenants();
        if (_currentTenantId === id) showTenant(id);
      } catch (e) { alert(e.message); }
    }

    async function saveTenantAdmin(tenantId) {
      const msg = $('tenant-admin-msg');
      msg.textContent = T('pf_saving'); msg.className = 'pf-msg';
      try {
        const trialDate = $('adm-trial-date').value;
        const body = {
          p_tenant_id: tenantId,
          p_status: $('adm-status').value,
          p_plan_id: $('adm-plan').value
        };
        if (trialDate) body.p_trial_ends_at = new Date(trialDate + 'T23:59:59').toISOString();
        await adminRpc('api_admin_update_tenant', body);
        msg.textContent = T('pf_saved_ok'); msg.className = 'pf-msg ok';
        loadTenants(); loadBilling();
        showTenant(tenantId);
      } catch (e) { msg.textContent = e.message; msg.className = 'pf-msg err'; }
    }

    async function saveMemberAdmin(tenantId, userId) {
      const msg = $(`mem-msg-${userId}`);
      if (msg) { msg.textContent = T('pf_saving'); msg.className = 'pf-msg'; }
      try {
        await adminRpc('api_admin_set_member', {
          p_tenant_id: tenantId,
          p_user_id: userId,
          p_role: $(`mem-role-${userId}`).value,
          p_status: $(`mem-status-${userId}`).value
        });
        if (msg) { msg.textContent = T('pf_saved_ok'); msg.className = 'pf-msg ok'; }
        loadUsers();
        showTenant(tenantId);
      } catch (e) { if (msg) { msg.textContent = e.message; msg.className = 'pf-msg err'; } }
    }

    function renderPager(elId, total, offset, onNav) {
      const el = $(elId);
      const page = Math.floor(offset / PAGE_SIZE) + 1;
      const pages = Math.max(1, Math.ceil((total || 0) / PAGE_SIZE));
      el.innerHTML = `
        <span>${esc(T('pf_page'))} ${page} / ${pages} (${total || 0})</span>
        <button type="button" class="saas-btn sm ghost" ${offset <= 0 ? 'disabled' : ''} data-dir="-1">${esc(T('pf_prev'))}</button>
        <button type="button" class="saas-btn sm ghost" ${offset + PAGE_SIZE >= total ? 'disabled' : ''} data-dir="1">${esc(T('pf_next'))}</button>`;
      el.querySelectorAll('button[data-dir]').forEach(b => {
        b.onclick = () => onNav(parseInt(b.getAttribute('data-dir'), 10));
      });

    function renderPlans(plans) {
      const el = $('plans');
      if (!el) return;
      el.innerHTML = '';
      if (!plans || !plans.length) {
        el.innerHTML = `<p class="muted-s">${esc(T('pf_loading'))}</p>`;
        return;
      }
      (plans || []).forEach(p => {
        const allowed = Array.isArray(p.modules) ? p.modules : [];
        const allMode = allowed.length === 0;
        const card = document.createElement('div');
        card.className = 'plan-card';
        card.innerHTML =
          `<div class="ph"><b>${esc(p.name)} (${esc(p.id)})</b>
             <span class="muted-s">${allMode ? esc(T('pf_all_modules')) : ''}</span></div>
           <div class="row" style="margin:0 0 12px">
             <label class="muted-s">${esc(T('pf_max_users'))}
               <input type="number" min="1" id="u-${esc(p.id)}" value="${esc(String(p.max_users))}" class="lim-input"></label>
             <label class="muted-s">${esc(T('pf_storage'))}
               <input type="number" min="1" id="s-${esc(p.id)}" value="${esc(String(p.storage_mb))}" class="lim-input"></label>
           </div>
           <div class="mod-grid">${MODULES.map(m =>
             `<label class="mod"><input type="checkbox" data-k="${esc(m[0])}" ${(allMode || allowed.includes(m[0])) ? 'checked' : ''}> ${esc(modLabel(m))}</label>`
           ).join('')}</div>
           <div class="row">
             <button type="button" class="saas-btn sm ghost" onclick="setAll(this,true)">${esc(T('pf_select_all'))}</button>
             <button type="button" class="saas-btn sm ghost" onclick="setAll(this,false)">${esc(T('pf_clear_all'))}</button>
             <button type="button" class="saas-btn sm" data-plan="${esc(p.id)}" onclick="savePlan(this)">${esc(T('pf_save'))} · ${esc(p.name)}</button>
             <span class="msg-inline" id="m-${esc(p.id)}"></span>
           </div>`;
        $('plans').appendChild(card);
      });
      fillTenantSelects();
    }

    function setAll(btn, val) {
      btn.closest('.plan-card').querySelectorAll('input[type=checkbox]').forEach(c => c.checked = val);
    }

    async function savePlan(btn) {
      const card = btn.closest('.plan-card');
      const planId = btn.getAttribute('data-plan');
      const mods = Array.from(card.querySelectorAll('input[type=checkbox]:checked')).map(c => c.getAttribute('data-k'));
      const payload = (mods.length === MODULES.length) ? [] : mods;
      const maxUsers = parseInt($('u-' + planId).value, 10);
      const storageMb = parseInt($('s-' + planId).value, 10);
      const m = $('m-' + planId); m.textContent = T('pf_saving'); m.className = 'msg-inline';
      const client = SaaS.client();
      const r1 = await client.rpc('api_admin_set_plan_modules', { p_plan_id: planId, p_modules: payload });
      if (r1.error) { m.textContent = '⛔ ' + r1.error.message; m.className = 'msg-inline err'; return; }
      const r2 = await client.rpc('api_admin_set_plan_limits', {
        p_plan_id: planId,
        p_max_users: Number.isFinite(maxUsers) ? maxUsers : null,
        p_storage_mb: Number.isFinite(storageMb) ? storageMb : null
      });
      if (r2.error) { m.textContent = '⛔ ' + r2.error.message; m.className = 'msg-inline err'; return; }
      m.textContent = T('pf_saved'); m.className = 'msg-inline ok';
    }
  </script>
</body>
</html>
