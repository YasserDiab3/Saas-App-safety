<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إنشاء حساب — HSEHub 360</title>
<meta name="description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta property="og:site_name" content="HSEHub 360">
<meta property="og:title" content="HSEHub 360 — Safety • Health • Environment">
<meta property="og:description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta property="og:image" content="https://saas-app-safety.vercel.app/assets/brand/logo.png">
<meta name="application-name" content="HSEHub 360">
<link rel="icon" type="image/png" href="/assets/brand/favicon.png">
<link rel="stylesheet" href="/css/saas-pages.css">
</head>
<body data-i18n-title="signup_doctitle">
  <div class="saas-shell">
    <div class="saas-card saas-signup-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="/assets/brand/logo.png" alt="HSEHub 360" class="saas-logo-img"></div>
        <h1 id="head-title" data-i18n="signup_title">إنشاء مؤسسة جديدة</h1>
        <p data-i18n="brand_sub">HSEHub 360 — السلامة • الصحة • البيئة</p>
      </div>
      <div class="saas-body">
        <!-- Step 1: registration form -->
        <div id="step-form" class="saas-step active">
          <div class="saas-field">
            <label data-i18n="f_org">اسم المؤسسة</label>
            <input id="org" class="saas-input" data-i18n-ph="ph_org">
          </div>
          <div class="saas-field">
            <label data-i18n="f_name">الاسم الكامل</label>
            <input id="name" class="saas-input" data-i18n-ph="ph_name" autocomplete="name">
          </div>
          <div class="saas-field">
            <label data-i18n="f_email">البريد الإلكتروني</label>
            <div class="saas-input-wrap">
              <span class="saas-input-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
              <input id="email" class="saas-input saas-input--icon" type="email" inputmode="email" autocapitalize="none" data-i18n-ph="ph_email" autocomplete="username">
            </div>
          </div>
          <div class="saas-field">
            <label data-i18n="f_phone">رقم الجوال</label>
            <div class="saas-phone-row">
              <select id="phone-cc" class="saas-input" aria-label="country code"></select>
              <input id="phone" class="saas-input" type="tel" inputmode="numeric" data-i18n-ph="ph_phone" autocomplete="tel-national">
            </div>
          </div>
          <div class="saas-field">
            <label data-i18n="f_password">كلمة المرور</label>
            <div class="saas-input-wrap">
              <span class="saas-input-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              <input id="pwd" class="saas-input saas-input--icon saas-input--pwd" type="password" data-i18n-ph="ph_pwd8" autocomplete="new-password">
              <button type="button" class="saas-pwd-toggle" aria-controls="pwd"></button>
            </div>
          </div>
          <div class="saas-field">
            <label data-i18n="f_password_confirm">تأكيد كلمة المرور</label>
            <div class="saas-input-wrap">
              <span class="saas-input-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              <input id="pwd2" class="saas-input saas-input--icon saas-input--pwd" type="password" data-i18n-ph="ph_pwd_confirm" autocomplete="new-password">
              <button type="button" class="saas-pwd-toggle" aria-controls="pwd2"></button>
            </div>
          </div>
          <div class="saas-terms">
            <div class="saas-terms-hd" data-i18n="su_terms_title">إقرار المسؤولية وشروط الاستخدام</div>
            <div id="terms-body" class="saas-terms-box" tabindex="0" data-i18n-html="su_terms_body"></div>
            <label class="saas-terms-check">
              <input type="checkbox" id="terms-accept" autocomplete="off">
              <span data-i18n="su_terms_accept_label">أقرّ بأنني مُخوَّل بتمثيل المؤسسة، وقرأت شروط استخدام HSEHub 360 (v2026.1) وأوافق عليها.</span>
            </label>
          </div>
          <button id="go" class="saas-btn" data-i18n="btn_signup" disabled onclick="doSignup()">إنشاء الحساب والمؤسسة</button>
        </div>

        <!-- Step 2: email OTP -->
        <div id="step-otp" class="saas-step">
          <p class="saas-otp-hint">
            <span data-i18n="su_otp_hint">أرسلنا رمزاً مكوّناً من 6 أرقام إلى</span><br>
            <strong id="otp-email"></strong>
          </p>
          <div class="saas-field">
            <label data-i18n="f_otp">رمز التفعيل</label>
            <input id="otp" class="saas-input" type="text" inputmode="numeric" maxlength="6" data-i18n-ph="ph_otp" autocomplete="one-time-code">
          </div>
          <button id="verify" class="saas-btn" data-i18n="btn_verify_otp" onclick="doVerifyOtp()">تأكيد الرمز ومتابعة</button>
          <button id="resend" type="button" class="saas-link-btn" data-i18n="btn_resend_otp" onclick="doResendOtp()">إعادة إرسال الرمز</button>
        </div>

        <!-- Step 3: org code success -->
        <div id="step-done" class="saas-step">
          <div class="saas-org-code">
            <div class="lbl" data-i18n="su_org_code_label">كود المؤسسة</div>
            <div class="code" id="org-code">—</div>
          </div>
          <p class="saas-otp-hint" data-i18n="su_org_code_hint">احفظ هذا الكود — ستحتاجه للدعم والتعريف</p>
          <button class="saas-btn" data-i18n="btn_continue_app" onclick="location.replace('/')">الدخول للتطبيق</button>
        </div>

        <div class="saas-msg" id="msg"></div>
        <div class="saas-foot" id="foot-links">
          <span data-i18n="have_account">لديك حساب؟</span>
          <a href="/login" data-i18n="login_link">تسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/saas/saas-config.js"></script>
  <script src="/js/saas/saas-brand.js"></script>
  <script src="/js/saas/supabase-bootstrap.js"></script>
  <script src="/js/saas/country-codes.js"></script>
  <script src="/js/saas/saas-i18n.js"></script>
  <script src="/js/saas/saas-auth-fields.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => SaaSI18n.t(k);
    const msg = (t, cls) => { $('msg').className = 'saas-msg ' + (cls || ''); $('msg').textContent = t; };

    let pending = { org: '', name: '', email: '', pwd: '', phoneCc: '+966', phone: '', termsVersion: '' };

    function syncSignupButton() {
      const accepted = $('terms-accept') && $('terms-accept').checked;
      $('go').disabled = !accepted;
    }

    function showStep(id) {
      document.querySelectorAll('.saas-step').forEach(el => el.classList.remove('active'));
      $(id).classList.add('active');
      $('foot-links').style.display = id === 'step-form' ? '' : 'none';
      if (id === 'step-otp') {
        $('head-title').textContent = T('su_otp_title');
        $('head-title').removeAttribute('data-i18n');
      }
    }

    function digitsOnly(s) { return String(s || '').replace(/\D/g, ''); }

    function validateForm() {
      const org = $('org').value.trim(), name = $('name').value.trim();
      const email = $('email').value.trim(), pwd = $('pwd').value, pwd2 = $('pwd2').value;
      const phoneCc = $('phone-cc').value, phone = digitsOnly($('phone').value);
      if (!org || !name || !email || !pwd || !pwd2 || !phone) { msg(T('su_fill_all'), 'err'); return null; }
      if (pwd.length < 8) { msg(T('su_pwd_short'), 'err'); return null; }
      if (pwd !== pwd2) { msg(T('su_pwd_mismatch'), 'err'); return null; }
      if (!phoneCc) { msg(T('su_phone_required'), 'err'); return null; }
      if (phone.length < 7 || phone.length > 15) { msg(T('su_phone_invalid'), 'err'); return null; }
      if (!$('terms-accept').checked) { msg(T('su_terms_required'), 'err'); return null; }
      return { org, name, email, pwd, phoneCc, phone, termsVersion: T('su_terms_version') };
    }

    async function provisionTenant() {
      msg(T('su_provisioning'));
      const { data, error } = await SaaS.client().rpc('api_provision_tenant', {
        p_name: pending.org,
        p_phone_country: pending.phoneCc,
        p_phone_number: pending.phone,
        p_terms_version: pending.termsVersion || T('su_terms_version')
      });
      if (error) throw new Error(error.message);
      const orgCode = (data && data.org_code) || (typeof data === 'string' ? JSON.parse(data).org_code : null);
      if (!orgCode) throw new Error(T('su_failed'));
      $('org-code').textContent = orgCode;
      showStep('step-done');
      msg(T('su_ok'), 'ok');
    }

    document.addEventListener('DOMContentLoaded', () => {
      SaaSI18n.init(() => {
        SaaSCountryCodes.refreshLabels($('phone-cc'));
        if (window.SaaSBrand && SaaSBrand.applySocialMeta) SaaSBrand.applySocialMeta({ title: document.title });
        if (window.SaaSAuthFields) {
          SaaSAuthFields.init();
          SaaSAuthFields.refreshLabels();
        }
      });
      SaaSCountryCodes.fillSelect($('phone-cc'), '+966');
      $('terms-accept').addEventListener('change', syncSignupButton);
      syncSignupButton();
    });

    async function doSignup() {
      const form = validateForm();
      if (!form) return;
      pending = {
        org: form.org, name: form.name, email: form.email, pwd: form.pwd,
        phoneCc: form.phoneCc, phone: form.phone, termsVersion: form.termsVersion
      };
      $('go').disabled = true;
      msg(T('su_creating'));
      try {
        const su = await SaaS.signUp(form.email, form.pwd, form.name);
        if (su.error) throw new Error(su.error.message);
        if (su.data?.session) {
          await provisionTenant();
        } else {
          $('otp-email').textContent = form.email;
          $('otp').value = '';
          showStep('step-otp');
          msg('');
        }
      } catch (e) {
        msg(e.message || T('su_failed'), 'err');
      } finally {
        syncSignupButton();
      }
    }

    async function doVerifyOtp() {
      const token = $('otp').value.trim();
      if (token.length < 6) { msg(T('su_otp_invalid'), 'err'); return; }
      $('verify').disabled = true;
      msg(T('su_creating'));
      try {
        const vr = await SaaS.verifySignupOtp(pending.email, token);
        if (vr.error) throw new Error(vr.error.message || T('su_otp_invalid'));
        if (!vr.data?.session) {
          const si = await SaaS.signIn(pending.email, pending.pwd);
          if (si.error) throw new Error(si.error.message);
        }
        await provisionTenant();
      } catch (e) {
        msg(e.message || T('su_otp_invalid'), 'err');
        $('verify').disabled = false;
      }
    }

    async function doResendOtp() {
      $('resend').disabled = true;
      try {
        const r = await SaaS.resendSignupOtp(pending.email);
        if (r.error) throw new Error(r.error.message);
        msg(T('su_otp_sent'), 'ok');
      } catch (e) {
        msg(e.message || T('su_failed'), 'err');
      } finally {
        setTimeout(() => { $('resend').disabled = false; }, 30000);
      }
    }
  </script>
</body>
</html>
