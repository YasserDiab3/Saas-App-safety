<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إنشاء حساب — QHSSE Consultant</title>
<link rel="icon" type="image/png" href="assets/brand/favicon.png">
<link rel="stylesheet" href="css/saas-pages.css">
</head>
<body data-i18n-title="signup_doctitle">
  <div class="saas-shell">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="assets/brand/logo.png" alt="QHSSE Consultant" class="saas-logo-img"></div>
        <h1 data-i18n="signup_title">إنشاء مؤسسة جديدة</h1>
        <p data-i18n="brand_sub">منصّة إدارة السلامة المهنية (HSE)</p>
      </div>
      <div class="saas-body">
        <div class="saas-field">
          <label data-i18n="f_org">اسم المؤسسة</label>
          <input id="org" class="saas-input" data-i18n-ph="ph_org">
        </div>
        <div class="saas-field">
          <label data-i18n="f_name">الاسم الكامل</label>
          <input id="name" class="saas-input" data-i18n-ph="ph_name" autocomplete="name">
        </div>
        <div class="saas-field">
          <label data-i18n="f_email">البريد الإلكتروني</label>
          <input id="email" class="saas-input" type="email" data-i18n-ph="ph_email" autocomplete="username">
        </div>
        <div class="saas-field">
          <label data-i18n="f_password">كلمة المرور</label>
          <input id="pwd" class="saas-input" type="password" data-i18n-ph="ph_pwd8" autocomplete="new-password">
        </div>
        <button id="go" class="saas-btn" data-i18n="btn_signup" onclick="doSignup()">إنشاء الحساب والمؤسسة</button>
        <div class="saas-msg" id="msg"></div>
        <div class="saas-foot">
          <span data-i18n="have_account">لديك حساب؟</span>
          <a href="login.html" data-i18n="login_link">تسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/saas-brand.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script src="js/saas/saas-i18n.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => SaaSI18n.t(k);
    const msg = (t, cls) => { $('msg').className = 'saas-msg ' + (cls || ''); $('msg').textContent = t; };
    document.addEventListener('DOMContentLoaded', () => SaaSI18n.init());
    async function doSignup() {
      const org = $('org').value.trim(), name = $('name').value.trim(), email = $('email').value.trim(), pwd = $('pwd').value;
      if (!org || !name || !email || !pwd) { msg(T('su_fill_all'), 'err'); return; }
      if (pwd.length < 8) { msg(T('su_pwd_short'), 'err'); return; }
      $('go').disabled = true; msg(T('su_creating'));
      try {
        const su = await SaaS.signUp(email, pwd, name);
        if (su.error) throw new Error(su.error.message);
        const si = await SaaS.signIn(email, pwd);
        if (si.error) throw new Error(T('su_confirm_email'));
        msg(T('su_provisioning'));
        const { error } = await SaaS.client().rpc('api_provision_tenant', { p_name: org });
        if (error) throw new Error(error.message);
        msg(T('su_ok'), 'ok');
        setTimeout(() => location.replace('/'), 800);
      } catch (e) { msg(e.message || T('su_failed'), 'err'); $('go').disabled = false; }
    }
  </script>
</body>
</html>
