<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الاشتراك والفوترة — HSEHub 360</title>
<meta name="description" content="HSEHub 360 — منصّة السلامة والصحة والبيئة. One Platform. Total Protection.">
<meta property="og:site_name" content="HSEHub 360">
<meta name="application-name" content="HSEHub 360">
<link rel="icon" type="image/png" href="assets/brand/favicon.png">
<link rel="stylesheet" href="css/saas-pages.css">
<link rel="stylesheet" href="css/saas-cookie-consent.css">
</head>
<body data-i18n-title="billing_doctitle">
  <div class="saas-page">
    <div class="saas-page-brand"><img src="assets/brand/logo.png" alt="HSEHub 360"></div>
    <div class="saas-page-hd">
      <h1>💳 <span data-i18n="billing_title">الاشتراك والفوترة</span></h1>
    </div>
    <div class="saas-panel" id="status" data-i18n="loading">جاري التحميل…</div>
    <div class="plans" id="plans"></div>
    <p style="margin-top:18px"><a class="saas-link" href="/" data-i18n="back_app">← العودة للتطبيق</a></p>
  </div>

  <script src="js/saas/saas-config.js"></script>
  <script src="js/saas/saas-brand.js"></script>
  <script src="js/saas/supabase-bootstrap.js"></script>
  <script src="js/saas/saas-escape.js"></script>
  <script src="js/saas/saas-i18n.js"></script>
  <script src="js/saas/saas-cookie-api.js"></script>
  <script src="js/saas/saas-cookie-consent.js"></script>
  <script>
    const T = k => SaaSI18n.t(k);
    const esc = s => SaaSEscape.html(s);
    let _data = null;
    const limKey = { free: 'lim_free', pro: 'lim_pro', enterprise: 'lim_enterprise' };

    document.addEventListener('DOMContentLoaded', () => SaaSI18n.init(() => { if (_data) render(_data); }));

    async function load() {
      await SaaS.ready;
      const s = await SaaS.getSession();
      if (!s) { location.replace('/login?next=' + encodeURIComponent(location.pathname + location.search)); return; }
      const { data, error } = await SaaS.client().rpc('api_billing_status');
      if (error) { document.getElementById('status').textContent = T('err_prefix') + error.message; return; }
      _data = data; render(data);
    }

    function statusLabel(st) {
      const map = { trialing: 'st_trialing', active: 'st_active', past_due: 'st_past_due', frozen: 'st_frozen', canceled: 'st_canceled' };
      return map[st] ? T(map[st]) : (st || '-');
    }
    function statusBadge(st) {
      const cls = (st === 'active' || st === 'trialing') ? 'ok' : (st === 'past_due' ? 'warn' : 'err');
      return `<span class="badge ${cls}">${esc(statusLabel(st))}</span>`;
    }

    function render(data) {
      const t = data.tenant || {}, sub = data.subscription || {};
      const locale = SaaSI18n.lang === 'ar' ? 'ar-EG' : 'en-US';
      const lim = data.limits || {};
      let html =
        `<b data-x>${T('lbl_org')}:</b> ${esc(t.name || '-')} &nbsp;|&nbsp; ` +
        (t.org_code ? `<b>${T('lbl_org_code')}:</b> <code>${esc(t.org_code)}</code> &nbsp;|&nbsp; ` : '') +
        `<b>${T('lbl_plan')}:</b> <span class="badge ok">${esc(t.plan_id || 'free')}</span> &nbsp;|&nbsp; ` +
        `<b>${T('lbl_status')}:</b> ${statusBadge(t.status)}`;
      if (t.trial_ends_at) html += ` &nbsp;|&nbsp; <b>${T('lbl_trial')}:</b> ${esc(new Date(t.trial_ends_at).toLocaleDateString(locale))}`;
      if (lim.max_users) html += ` &nbsp;|&nbsp; <b>${T('lbl_seats')}:</b> ${esc(lim.user_count || 0)}/${esc(lim.max_users)}`;
      if (lim.storage_mb) html += ` &nbsp;|&nbsp; <b>${T('lbl_storage')}:</b> ${esc(lim.storage_used_mb || 0)}/${esc(lim.storage_mb)} MB`;
      if (sub.current_period_end) html += ` &nbsp;|&nbsp; <b>${T('lbl_renewal')}:</b> ${esc(new Date(sub.current_period_end).toLocaleDateString(locale))}`;
      if (data.payment_required) html += `<div class="saas-msg warn" style="margin-top:12px">${esc(T('payment_required_banner'))} <a href="billing.html">${esc(T('subscribe'))}</a></div>`;
      else if (t.plan_id === 'free' && Array.isArray(data.modules) && data.modules.length) {
        html += `<div class="saas-msg ok" style="margin-top:12px">${esc(T('trial_modules_banner'))}: ${esc(data.modules.length)} — ${esc(data.modules.join(', '))}</div>`;
      }
      html += ` &nbsp;|&nbsp; <a class="saas-link" href="team.html">${esc(T('team_title'))}</a>`;
      document.getElementById('status').innerHTML = html;

      const plansEl = document.getElementById('plans');
      plansEl.innerHTML = '';
      (data.plans || []).forEach(p => {
        const cur = (t.plan_id === p.id);
        const price = limKey[p.id] ? T(limKey[p.id]) : (p.max_users + ' ' + T('users_suffix'));
        const div = document.createElement('div');
        div.className = 'plan' + (cur ? ' cur' : '');
        const h2 = document.createElement('h2');
        h2.textContent = p.name || p.id;
        const priceEl = document.createElement('div');
        priceEl.className = 'price';
        priceEl.textContent = price;
        const btn = document.createElement('button');
        btn.className = 'saas-btn' + (p.id === 'free' && !cur ? ' ghost' : '');
        const needsQuote = p.id === 'enterprise' || !p.price_id;
        if (cur) {
          btn.disabled = true;
          btn.textContent = T('current_plan');
        } else if (p.id === 'free') {
          btn.disabled = true;
          btn.textContent = T('default_plan');
        } else if (needsQuote) {
          btn.textContent = T('request_quote');
          btn.addEventListener('click', () => requestQuote(p.id));
        } else {
          btn.textContent = T('subscribe');
          btn.addEventListener('click', () => checkout(p.id));
        }
        div.appendChild(h2);
        div.appendChild(priceEl);
        div.appendChild(btn);
        plansEl.appendChild(div);
      });
    }

    async function requestQuote(planId) {
      const notes = prompt(T('request_quote_notes_ph') || '', '') || '';
      try {
        const { data, error } = await SaaS.client().rpc('api_request_price_quote', {
          p_plan_id: planId || 'enterprise',
          p_notes: notes.trim() || null
        });
        if (error) throw new Error(error.message);
        if (data && data.success === false) throw new Error(data.message || T('checkout_failed'));
        alert(T('request_quote_ok'));
      } catch (e) {
        alert(T('err_prefix') + (e.message || String(e)));
      }
    }

    async function checkout(plan) {
      const s = await SaaS.getSession();
      try {
        const res = await fetch(`${SAAS_CONFIG.supabaseUrl}/functions/v1/create-checkout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${s.access_token}`, 'apikey': SAAS_CONFIG.supabaseAnonKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan })
        });
        const j = await res.json();
        if (j.url) location.href = j.url; else alert(T('checkout_failed') + ': ' + (j.error || res.status));
      } catch (e) { alert(T('checkout_failed') + ': ' + e.message); }
    }
    load();
  </script>
</body>
</html>
