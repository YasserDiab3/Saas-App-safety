<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>المصادقة الثنائية — HSEHub 360</title>
<link rel="icon" type="image/png" href="/assets/brand/favicon.png">
<link rel="stylesheet" href="/css/saas-pages.css">
</head>
<body data-i18n-title="mfa_setup_doctitle">
  <div class="saas-shell">
    <div class="saas-card">
      <div class="saas-head">
        <div class="saas-logo"><img src="/assets/brand/logo.png" alt="HSEHub 360" class="saas-logo-img"></div>
        <h1 data-i18n="mfa_setup_title">تفعيل المصادقة الثنائية (TOTP)</h1>
        <p data-i18n="mfa_setup_sub">امسح رمز QR بتطبيق Google Authenticator أو Microsoft Authenticator أو Okta Verify</p>
        <p id="acct" class="saas-mfa-acct" hidden></p>
      </div>
      <div class="saas-body">
        <div id="step-enroll">
          <p class="saas-mfa-hint" data-i18n="mfa_setup_hint">بعد المسح، انتظر ظهور رمز جديد (6 أرقام) في التطبيق ثم أدخله هنا.</p>
          <div id="qr-wrap" class="saas-mfa-qr" hidden></div>
          <div class="saas-field">
            <label data-i18n="mfa_secret_label">الرمز السري (إدخال يدوي)</label>
            <div class="saas-mfa-secret-row">
              <input id="secret" class="saas-input" readonly dir="ltr">
              <button type="button" id="copy-secret" class="saas-btn saas-btn--ghost saas-btn--sm" data-i18n="mfa_copy_secret">نسخ</button>
            </div>
          </div>
          <div class="saas-field">
            <label data-i18n="mfa_code_label">رمز التحقق من التطبيق</label>
            <input id="code" class="saas-input" inputmode="numeric" autocomplete="one-time-code" maxlength="6" dir="ltr" data-i18n-ph="mfa_code_ph">
          </div>
          <button id="confirm" class="saas-btn" data-i18n="mfa_confirm_btn">تأكيد التفعيل</button>
          <button type="button" id="reset" class="saas-btn saas-btn--ghost" data-i18n="mfa_reset_btn">إعادة الإعداد (رمز QR جديد)</button>
        </div>
        <div id="step-done" hidden>
          <p class="saas-msg ok" data-i18n="mfa_done">تم تفعيل المصادقة الثنائية بنجاح.</p>
          <a href="/" class="saas-btn saas-btn--ghost" data-i18n="mfa_back_app">العودة للتطبيق</a>
        </div>
        <div class="saas-msg" id="msg"></div>
      </div>
    </div>
  </div>

  <script src="/js/saas/saas-config.js"></script>
  <script src="/js/saas/saas-auth-storage.js"></script>
  <script src="/js/saas/supabase-bootstrap.js"></script>
  <script src="/js/saas/saas-mfa.js"></script>
  <script src="/js/saas/saas-i18n.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const T = k => (window.SaaSI18n ? SaaSI18n.t(k) : k);
    const msg = (t, cls) => { $('msg').className = 'saas-msg ' + (cls || ''); $('msg').textContent = t; };
    let factorId = null;
    let userEmail = '';

    function showEnroll(ui) {
      factorId = ui.factorId;
      $('step-enroll').hidden = false;
      $('step-done').hidden = true;
      $('qr-wrap').hidden = !ui.qrCode;
      $('qr-wrap').innerHTML = ui.qrCode || '';
      $('secret').value = ui.secret || '';
      $('code').value = '';
      msg('', '');
    }

    async function loadEnrollment(forceReset) {
      const client = SaaS.client();
      const user = await SaaS.getUser();
      userEmail = user?.email || '';
      if (userEmail) {
        $('acct').hidden = false;
        $('acct').textContent = userEmail;
      }
      const state = forceReset
        ? await SaaSMfa.resetTotpEnrollment(client, { email: userEmail })
        : await SaaSMfa.beginTotpEnrollment(client, { email: userEmail });

      if (state.status === 'verified') {
        $('step-enroll').hidden = true;
        $('step-done').hidden = false;
        return;
      }
      showEnroll(state);
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.SaaSI18n) SaaSI18n.init();
    });

    (async () => {
      await SaaS.ready;
      const session = await SaaS.getSession();
      if (!session) {
        location.replace('/login?next=' + encodeURIComponent('/mfa-setup'));
        return;
      }
      try {
        await loadEnrollment(false);
      } catch (e) {
        msg(SaaSMfa.mapMfaError(e), 'err');
      }
    })();

    $('copy-secret').addEventListener('click', async () => {
      const secret = $('secret').value.replace(/\s+/g, '');
      if (!secret) return;
      try {
        await navigator.clipboard.writeText(secret);
        msg(T('mfa_secret_copied') || 'تم نسخ الرمز السري', 'ok');
      } catch (_e) {
        $('secret').select();
        document.execCommand('copy');
        msg(T('mfa_secret_copied') || 'تم نسخ الرمز السري', 'ok');
      }
    });

    $('reset').addEventListener('click', async () => {
      $('reset').disabled = true;
      $('confirm').disabled = true;
      try {
        await loadEnrollment(true);
        msg(T('mfa_reset_ok') || 'تم إنشاء رمز QR جديد — امسحه من جديد في التطبيق', 'ok');
      } catch (e) {
        if (e.code === 'MFA_VERIFIED_STUCK') {
          msg(T('mfa_verified_stuck') || SaaSMfa.mapMfaError(e), 'err');
        } else {
          msg(SaaSMfa.mapMfaError(e), 'err');
        }
      }
      $('reset').disabled = false;
      $('confirm').disabled = false;
    });

    $('confirm').addEventListener('click', async () => {
      const code = SaaSMfa.normalizeTotpCode($('code').value);
      if (!code || !factorId) { msg(T('mfa_code_required') || 'أدخل رمز التحقق', 'err'); return; }
      $('confirm').disabled = true;
      try {
        await SaaSMfa.confirmEnrollment(SaaS.client(), factorId, code);
        $('step-enroll').hidden = true;
        $('step-done').hidden = false;
        msg('', '');
      } catch (e) {
        msg(SaaSMfa.mapMfaError(e), 'err');
        $('confirm').disabled = false;
      }
    });
  </script>
</body>
</html>
